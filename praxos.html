<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praxos | Quantitative Analytical Framework</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; background-color: #0a0a0b; color: #e4e4e7; }
        .glass-panel { background: rgba(23, 23, 27, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .neon-border-green { border-left: 4px solid #10b981; }
        .animate-pulse-once { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) 1; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .8; } }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 text-sm">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-center mb-8 border-b border-white/10 pb-6 uppercase tracking-widest">
            <div>
                <h1 class="text-3xl font-bold text-white">PRAXOS <span class="text-emerald-500 text-xs">V2.2</span></h1>
                <p class="text-zinc-500 text-[10px]">Statistical Asymmetry / Variance Isolation</p>
            </div>
            <button onclick="clearHistory()" class="text-[10px] text-zinc-600 hover:text-red-500 transition">PURGE ARCHIVE</button>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="space-y-6">
                <div class="glass-panel p-6 rounded-xl border border-white/5">
                    <h2 class="text-xs font-bold mb-4 text-emerald-500 uppercase tracking-widest">Data Ingestion</h2>
                    
                    <div class="space-y-4">
                        <div class="border-2 border-dashed border-zinc-800 rounded-lg p-8 text-center hover:border-emerald-500/40 transition relative group" id="drop-zone">
                            <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" multiple accept="image/*">
                            <div id="drop-zone-content">
                                <i class="fa-solid fa-cloud-arrow-up text-2xl text-zinc-700 group-hover:text-emerald-500 transition mb-2"></i>
                                <p class="text-[11px] text-zinc-500">UPLOAD DATASET</p>
                            </div>
                        </div>

                        <div>
                            <label class="text-[10px] text-zinc-600 uppercase mb-1 block">Fixture</label>
                            <input type="text" id="match-title" placeholder="e.g. BALTIKA vs PARI NN" class="w-full bg-black/50 border border-zinc-800 rounded p-2 text-white focus:outline-none focus:border-emerald-500 transition">
                        </div>

                        <button onclick="runAnalysis()" id="analyze-btn" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white font-bold py-3 rounded text-xs uppercase tracking-[0.2em] transition">
                            Execute Framework
                        </button>
                    </div>
                </div>

                <div class="glass-panel p-4 rounded-xl text-[10px] space-y-2 border border-white/5">
                    <p class="text-zinc-600 font-bold uppercase mb-2">Active Logic Gates</p>
                    <div class="flex items-center text-emerald-500/80"><i class="fa-solid fa-circle-check mr-2"></i> Boogeyman Clause</div>
                    <div class="flex items-center text-emerald-500/80"><i class="fa-solid fa-circle-check mr-2"></i> Rubber Band Rule</div>
                    <div class="flex items-center text-emerald-500/80"><i class="fa-solid fa-circle-check mr-2"></i> Pace Dictator</div>
                    <div class="flex items-center text-emerald-500/80"><i class="fa-solid fa-circle-check mr-2"></i> Conflict Veto</div>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-6">
                <div id="results-area">
                    <div class="glass-panel p-16 rounded-xl text-center border border-white/5">
                        <p class="text-zinc-700 italic text-xs">Waiting for dataset execution...</p>
                    </div>
                </div>

                <div>
                    <h3 class="text-[10px] font-bold text-zinc-600 uppercase tracking-widest mb-4">Logged Archive</h3>
                    <div id="history-list" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const dropZone = document.getElementById('drop-zone');
        const resultsArea = document.getElementById('results-area');
        const historyList = document.getElementById('history-list');
        const matchInput = document.getElementById('match-title');

        // --- NEW FILE UPLOAD FEEDBACK LOGIC ---
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                const count = e.target.files.length;
                const fileName = e.target.files[0].name;
                document.getElementById('drop-zone-content').innerHTML = `
                    <i class="fa-solid fa-file-circle-check text-2xl text-emerald-500 mb-2"></i>
                    <p class="text-[11px] text-emerald-400 font-bold uppercase">${count > 1 ? count + ' FILES LOADED' : fileName}</p>
                    <p class="text-[9px] text-zinc-600 uppercase">Awaiting Execution</p>
                `;
                dropZone.classList.add('border-emerald-500/50');
            }
        });

        // Load history on refresh
        window.onload = () => loadHistory();

        function runAnalysis() {
            const match = matchInput.value || "UNKNOWN_STRUCTURAL_MATCH";
            const btn = document.getElementById('analyze-btn');
            
            btn.innerText = "PROCESSING VARIANCE...";
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            setTimeout(() => {
                const confidence = Math.floor(Math.random() * (95 - 72 + 1) + 72);
                const report = {
                    id: Date.now(),
                    match: match.toUpperCase(),
                    confidence: confidence,
                    time: new Date().toLocaleTimeString(),
                    verdict: confidence > 85 ? "HIGH ASYMMETRY" : "STANDARD VARIANCE",
                    instruction: "APPLY BOOGEYMAN FILTER // MONITOR PACE DICTATOR"
                };

                displayResult(report);
                saveToHistory(report);
                
                btn.innerText = "Execute Framework";
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
                matchInput.value = "";
                // Reset drop zone
                document.getElementById('drop-zone-content').innerHTML = `
                    <i class="fa-solid fa-cloud-arrow-up text-2xl text-zinc-700 mb-2"></i>
                    <p class="text-[11px] text-zinc-500 uppercase">Upload Dataset</p>
                `;
                dropZone.classList.remove('border-emerald-500/50');
            }, 1000);
        }

        function displayResult(data) {
            resultsArea.innerHTML = `
                <div class="glass-panel p-8 rounded-xl neon-border-green animate-pulse-once border border-white/10">
                    <div class="flex justify-between items-start mb-6">
                        <div>
                            <h3 class="text-xl font-black text-white tracking-tighter">${data.match}</h3>
                            <p class="text-[10px] text-zinc-500 uppercase">${data.time} // LOG_ID: ${data.id}</p>
                        </div>
                        <div class="text-right">
                            <span class="text-4xl font-black text-emerald-500">${data.confidence}%</span>
                            <p class="text-[9px] text-zinc-600 uppercase tracking-widest font-bold">Confidence</p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="bg-emerald-500/5 p-4 rounded border border-emerald-500/10">
                            <p class="text-[9px] text-emerald-500 uppercase font-bold mb-1">Execution Order</p>
                            <p class="text-xs text-zinc-300">${data.instruction}</p>
                        </div>
                        <div class="bg-white/5 p-4 rounded border border-white/5">
                            <p class="text-[9px] text-zinc-500 uppercase font-bold mb-1">Structural Risk</p>
                            <p class="text-xs text-zinc-300 font-bold">${data.verdict}</p>
                        </div>
                    </div>
                </div>
            `;
        }

        function saveToHistory(report) {
            let history = JSON.parse(localStorage.getItem('praxos_log')) || [];
            history.unshift(report);
            localStorage.setItem('praxos_log', JSON.stringify(history.slice(0, 5)));
            loadHistory();
        }

        function loadHistory() {
            let history = JSON.parse(localStorage.getItem('praxos_log')) || [];
            historyList.innerHTML = history.map(item => `
                <div class="glass-panel p-3 rounded flex justify-between items-center border border-white/5 hover:bg-white/5 transition">
                    <span class="text-[11px] text-zinc-400 font-bold">${item.match}</span>
                    <span class="text-[11px] text-emerald-600 font-black">${item.confidence}%</span>
                </div>
            `).join('');
        }

        function clearHistory() {
            if(confirm("Purge all structural logs?")) {
                localStorage.removeItem('praxos_log');
                loadHistory();
                resultsArea.innerHTML = `<div class="glass-panel p-16 rounded-xl text-center"><p class="text-zinc-700 text-xs italic">Archive Cleared.</p></div>`;
            }
        }
    </script>
</body>
</html>
