<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Praxos Apex | Terminal v2.0</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
    body { background:#03070b; color:#e2e8f0; font-family: 'JetBrains+Mono', monospace; }
    .glass { background:rgba(10, 15, 20, 0.95); border:1px solid rgba(16, 185, 129, 0.2); }
    .term-border { border-left: 4px solid #10b981; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8">
  <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
    <div class="lg:col-span-4 space-y-6">
      <header class="mb-8 border-b border-emerald-500/20 pb-4">
        <h1 class="text-3xl font-black tracking-tighter text-white">PRAXOS <span class="text-emerald-500">APEX</span></h1>
        <p class="text-[10px] text-emerald-500/70 uppercase tracking-[0.2em] mt-1">v2.0 [BURNOUT CALIBRATED]</p>
      </header>
      <div class="glass rounded-xl p-5">
        <input id="files" type="file" accept="image/*" multiple class="block w-full text-xs text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-bold file:bg-emerald-500/10 file:text-emerald-500 cursor-pointer mb-6" />
        <button id="runBtn" class="w-full py-4 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-black font-black uppercase text-[12px] tracking-[0.2em] transition-all mb-4">Execute Framework</button>
        <div class="h-1.5 w-full bg-zinc-900 rounded-full overflow-hidden"><div id="progressBar" class="h-full bg-emerald-500 w-0 transition-all shadow-[0_0_10px_#10b981]"></div></div>
      </div>
    </div>
    <div class="lg:col-span-8 flex flex-col h-full">
      <div class="glass rounded-xl p-6 flex flex-col h-full term-border relative">
        <textarea id="terminal" readonly class="flex-grow w-full min-h-[550px] bg-transparent text-[13px] text-emerald-400 font-medium leading-relaxed resize-none" placeholder="AWAITING DATA TENSORS..."></textarea>
      </div>
    </div>
  </div>

<script>
const els = { files: document.getElementById("files"), runBtn: document.getElementById("runBtn"), terminal: document.getElementById("terminal"), progressBar: document.getElementById("progressBar") };

els.runBtn.onclick = async () => {
  const files = [...els.files.files];
  if (files.length !== 3) return alert("Upload 3 images.");
  els.terminal.value = ">> INITIALIZING V2.0 BURNOUT PROTOCOLS...";
  const texts = [];
  for (let i = 0; i < files.length; i++) {
    const res = await Tesseract.recognize(files[i], "eng");
    texts.push(res.data.text.replace(/\r/g, "\n").trim());
    els.progressBar.style.width = ((i+1)/3*100) + "%";
  }
  const sorted = autoSort(texts);
  const h2h = extract(truncate(sorted.h2hText));
  const home = extract(sorted.homeText);
  const away = extract(sorted.awayText);
  els.terminal.value = runLogic(sorted.homeName, sorted.awayName, h2h, home, away);
};

function truncate(t) { return t.split(/\b(20\d{2})\b/).filter((c,i)=>i===0||parseInt(c)>=2023).join(" "); }
function extract(t) { 
  let r=[]; 
  const lines = t.split("\n");
  lines.forEach(l => {
    let m = l.match(/(\d)\s*[-: ]\s*(\d)/);
    if(m) r.push({h:parseInt(m[1]), a:parseInt(m[2]), t:parseInt(m[1])+parseInt(m[2])});
  });
  return r.slice(0,10);
}

function autoSort(texts) {
  let pools = texts.map(t => t.split('\n').map(l => l.replace(/[^A-Z\s]/g, "").trim()).filter(l => l.length > 3 && !/SUMMARY|ODDS|H2H|NEWS|LINEUPS/.test(l)));
  let flat = pools.flat();
  let counts = {}; flat.forEach(e => counts[e] = (counts[e] || 0) + 1);
  let sorted = Object.keys(counts).sort((a,b) => counts[b] - counts[a]);
  let tA = sorted[0], tB = sorted[1];
  let h2hIdx = texts.findIndex(t => t.toUpperCase().includes(tA) && t.toUpperCase().includes(tB));
  if(h2hIdx === -1) h2hIdx = 0;
  let h2hText = texts[h2hIdx], rem = texts.filter((_,i)=>i!==h2hIdx);
  let isAHome = rem[0].toUpperCase().includes(tA);
  return (h2hText.toUpperCase().indexOf(tA) < h2hText.toUpperCase().indexOf(tB)) 
    ? {h2hText, homeText:isAHome?rem[0]:rem[1], awayText:isAHome?rem[1]:rem[0], homeName:tA, awayName:tB}
    : {h2hText, homeText:isAHome?rem[1]:rem[0], awayText:isAHome?rem[0]:rem[1], homeName:tB, awayName:tA};
}

function runLogic(hN, aN, h2h, home, away) {
  let h2hW = h2h.filter(r=>r.h>r.a).length/h2h.length, draws = h2h.filter(r=>r.h===r.a).length/h2h.length;
  let h2hAvg = h2h.reduce((s,r)=>s+r.t,0)/h2h.length;
  let macroAvg = (home.reduce((s,r)=>s+r.t,0)/home.length + away.reduce((s,r)=>s+r.t,0)/away.length)/2;
  
  // V2.0 BURNOUT LOGIC
  let burnout = (macroAvg >= 3.0 && h2hAvg >= 2.8); 
  let primaryLabel = draws >= 0.35 ? "Draw (X) Risk / 1X Protection" : (h2hW >= 0.6 ? `${hN} Moneyline (1)` : "1X (Home) or X2 (Away)");
  let secLabel = "Over 2.5 Goals / BTTS YES", secConf = Math.min(99, Math.floor(75 + (macroAvg * 4)));
  let note = "No extreme structural anomaly.";

  if (burnout) {
    secLabel = "Under 3.5 Goals / BTTS NO"; secConf = 85;
    note = "🚨 LATTICE BURNOUT 🚨. Macro-velocity is dangerously high. Tactical regression to a defensive lock (0-0/1-0) is mathematically probable.";
  } else if (h2hAvg <= 2.2 && macroAvg >= 2.8) {
    secLabel = "Under 3.5 Goals"; secConf = 85;
    note = "🚨 FRICTION VETO 🚨.";
  }

  return `**NODE: ${hN} VS ${aN}**\n\nPRIMARY VECTOR: ${primaryLabel}\n\nSECONDARY CONSTRAINT: ${secLabel}\nConfidence: ${secConf}%\n\n*(System Note: ${note})*`;
}
</script>
</body>
</html>
