<!DOCTYPE html>  <html lang="en">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  
  <title>Praxos Scanner</title>  
  <script src="https://cdn.tailwindcss.com"></script>  
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>  
  <style>  
    body { background:#07111a; color:#e6edf5; }  
    .panel { background:rgba(12,20,30,.95); border:1px solid rgba(255,255,255,.08); }  
    .soft { color:#8ea1b5; }  
    .good { color:#39d98a; }  
    .warn { color:#ffbf5f; }  
    .bad { color:#ff667a; }  
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }  
  </style>  
</head>  
<body class="min-h-screen p-4 md:p-6">  
  <div class="max-w-7xl mx-auto">  
    <div class="mb-6">  
      <h1 class="text-3xl md:text-4xl font-black tracking-tight">PRAXOS SCANNER</h1>  
      <p class="soft mt-2">Upload 3 screenshots in one go: H2H, home recent form, away recent form.</p>  
    </div>  <div class="grid grid-cols-1 xl:grid-cols-12 gap-6">  
  <div class="xl:col-span-4 space-y-6">  
    <div class="panel rounded-2xl p-4">  
      <h2 class="text-xl font-bold mb-4">Upload</h2>  
      <input id="files" type="file" accept="image/*" multiple class="block w-full text-sm mb-4" />  
      <div class="flex gap-3">  
        <button id="runBtn" class="flex-1 px-4 py-3 rounded-xl bg-cyan-600 hover:bg-cyan-500 font-bold">Run Praxos</button>  
        <button id="clearBtn" class="px-4 py-3 rounded-xl bg-zinc-800 hover:bg-zinc-700 font-semibold">Clear</button>  
      </div>  

      <div class="mt-4">  
        <div class="flex justify-between text-sm">  
          <span class="soft">Progress</span>  
          <span id="progressText" class="mono">0%</span>  
        </div>  
        <div class="mt-2 h-2 bg-slate-800 rounded-full overflow-hidden">  
          <div id="progressBar" class="h-full w-0 bg-emerald-500"></div>  
        </div>  
      </div>  
    </div>  

    <div class="panel rounded-2xl p-4">  
      <h2 class="text-xl font-bold mb-4">OCR / Engine Log</h2>  
      <textarea id="log" class="w-full min-h-[320px] rounded-xl bg-black/20 p-3 mono text-sm"></textarea>  
    </div>  
  </div>  

  <div class="xl:col-span-8 space-y-6">  
    <div class="panel rounded-2xl p-4">  
      <div class="grid grid-cols-1 md:grid-cols-3 gap-4">  
        <div class="rounded-xl bg-slate-900/70 p-4">  
          <div class="soft text-sm">Home Team</div>  
          <div id="homeTeam" class="text-xl font-bold mt-1">-</div>  
        </div>  
        <div class="rounded-xl bg-slate-900/70 p-4">  
          <div class="soft text-sm">Away Team</div>  
          <div id="awayTeam" class="text-xl font-bold mt-1">-</div>  
        </div>  
        <div class="rounded-xl bg-slate-900/70 p-4">  
          <div class="soft text-sm">Mode / Stake</div>  
          <div id="modeStake" class="text-xl font-bold mt-1">-</div>  
        </div>  
      </div>  
    </div>  

    <div class="panel rounded-2xl p-4">  
      <h2 class="text-xl font-bold mb-4">Qualified Picks (70%+)</h2>  
      <div id="qualified" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-3"></div>  
    </div>  

    <div class="panel rounded-2xl p-4">  
      <h2 class="text-xl font-bold mb-4">Primary</h2>  
      <div id="primary" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>  
    </div>  

    <div class="panel rounded-2xl p-4">  
      <h2 class="text-xl font-bold mb-4">Secondary</h2>  
      <div id="secondary" class="grid grid-cols-1 md:grid-cols-2 gap-3"></div>  
    </div>  

    <div class="panel rounded-2xl p-4">  
      <h2 class="text-xl font-bold mb-4">Possible Scores</h2>  
      <div id="scores" class="grid grid-cols-2 md:grid-cols-4 gap-3"></div>  
    </div>  

    <div class="panel rounded-2xl p-4">  
      <h2 class="text-xl font-bold mb-4">Parsed Datasets</h2>  
      <div class="grid grid-cols-1 lg:grid-cols-3 gap-4">  
        <pre id="h2hData" class="bg-black/20 p-3 rounded-xl text-xs mono whitespace-pre-wrap"></pre>  
        <pre id="homeData" class="bg-black/20 p-3 rounded-xl text-xs mono whitespace-pre-wrap"></pre>  
        <pre id="awayData" class="bg-black/20 p-3 rounded-xl text-xs mono whitespace-pre-wrap"></pre>  
      </div>  
    </div>  
  </div>  
</div>

  </div>  <script>  
<script>
const els = {
  files: document.getElementById("files"),
  runBtn: document.getElementById("runBtn"),
  clearBtn: document.getElementById("clearBtn"),
  log: document.getElementById("log"),
  progressBar: document.getElementById("progressBar"),
  progressText: document.getElementById("progressText"),
  homeTeam: document.getElementById("homeTeam"),
  awayTeam: document.getElementById("awayTeam"),
  modeStake: document.getElementById("modeStake"),
  qualified: document.getElementById("qualified"),
  primary: document.getElementById("primary"),
  secondary: document.getElementById("secondary"),
  scores: document.getElementById("scores"),
  h2hData: document.getElementById("h2hData"),
  homeData: document.getElementById("homeData"),
  awayData: document.getElementById("awayData"),
};

function log(msg) {
  els.log.value += msg + "\n";
  els.log.scrollTop = els.log.scrollHeight;
}

function setProgress(v) {
  const n = Math.max(0, Math.min(100, Math.round(v)));
  els.progressBar.style.width = n + "%";
  els.progressText.textContent = n + "%";
}

function clearUI() {
  els.log.value = "";
  setProgress(0);
  els.homeTeam.textContent = "-";
  els.awayTeam.textContent = "-";
  els.modeStake.textContent = "-";
  els.qualified.innerHTML = "";
  els.primary.innerHTML = "";
  els.secondary.innerHTML = "";
  els.scores.innerHTML = "";
  els.h2hData.textContent = "";
  els.homeData.textContent = "";
  els.awayData.textContent = "";
  els.files.value = "";
}

function clearOutputsOnly() {
  els.homeTeam.textContent = "-";
  els.awayTeam.textContent = "-";
  els.modeStake.textContent = "-";
  els.qualified.innerHTML = "";
  els.primary.innerHTML = "";
  els.secondary.innerHTML = "";
  els.scores.innerHTML = "";
  els.h2hData.textContent = "";
  els.homeData.textContent = "";
  els.awayData.textContent = "";
}

els.clearBtn.onclick = clearUI;

els.runBtn.onclick = async () => {
  const files = [...els.files.files].filter(f => f.type.startsWith("image/"));
  if (files.length !== 3) {
    alert("Please upload exactly 3 images.");
    return;
  }

  clearOutputsOnly();
  log("Starting Praxos scan...");

  const scanned = [];
  for (let i = 0; i < files.length; i++) {
    const text = await runOCR(files[i], i, files.length);
    scanned.push({ file: files[i], text });
  }

  const matchup = detectMatchupFromHeaders(scanned);
  if (!matchup.home || !matchup.away) {
    log("Could not reliably detect fixture header.");
    alert("Praxos could not reliably detect the match teams from the screenshot headers.");
    return;
  }

  els.homeTeam.textContent = matchup.home;
  els.awayTeam.textContent = matchup.away;
  log(`Detected matchup: ${matchup.home} vs ${matchup.away}`);

  const assigned = assignImagesStrict(scanned, matchup);
  if (!assigned.h2h || !assigned.home || !assigned.away) {
    log("Could not assign H2H / HOME / AWAY images.");
    alert("Praxos could not confidently classify the 3 screenshots.");
    return;
  }

  log(`Assigned H2H: ${assigned.h2h.file.name}`);
  log(`Assigned HOME: ${assigned.home.file.name}`);
  log(`Assigned AWAY: ${assigned.away.file.name}`);

  const h2hRows = parseScreenshotStrict(assigned.h2h.text, matchup.home, matchup.away, "h2h");
  const homeRows = parseScreenshotStrict(assigned.home.text, matchup.home, matchup.away, "home");
  const awayRows = parseScreenshotStrict(assigned.away.text, matchup.home, matchup.away, "away");

  els.h2hData.textContent = JSON.stringify(h2hRows, null, 2);
  els.homeData.textContent = JSON.stringify(homeRows, null, 2);
  els.awayData.textContent = JSON.stringify(awayRows, null, 2);

  if (h2hRows.length < 1 || homeRows.length < 3 || awayRows.length < 3) {
    log("Not enough valid parsed rows.");
    alert("Not enough valid rows were parsed. Use clearer screenshots.");
    return;
  }

  const result = analyzePraxos({
    homeTeam: matchup.home,
    awayTeam: matchup.away,
    h2hRows,
    homeRows,
    awayRows,
    threshold: 70
  });

  renderResult(result);
  setProgress(100);
  log("Analysis complete.");
};

async function runOCR(file, index, total) {
  log(`OCR -> ${file.name}`);
  const res = await Tesseract.recognize(file, "eng", {
    logger: m => {
      if (m.status === "recognizing text") {
        const pct = ((index + m.progress) / total) * 100;
        setProgress(pct);
      }
    }
  });
  return normalizeText(res.data.text);
}

function normalizeText(text) {
  return text
    .replace(/\r/g, "\n")
    .replace(/[|]/g, " ")
    .replace(/[“”]/g, '"')
    .replace(/[‘’]/g, "'")
    .replace(/[—–]/g, "-")
    .replace(/[^\S\n]+/g, " ")
    .replace(/\n{2,}/g, "\n")
    .trim();
}

function normalizeName(s) {
  return (s || "")
    .toLowerCase()
    .replace(/[^a-z0-9\s]/g, " ")
    .replace(/\s+/g, " ")
    .trim();
}

function sameTeam(a, b) {
  const x = normalizeName(a);
  const y = normalizeName(b);
  if (!x || !y) return false;
  return x === y || x.includes(y) || y.includes(x);
}

function looksLikeTeam(s) {
  if (!s) return false;
  const t = s.trim();
  if (!/[A-Za-z]/.test(t)) return false;
  if (/^(summary|odds|h2h|standings|lineups|news|football|head-to-head matches|head-to-head|stats)$/i.test(t)) return false;
  if (/^\d{4}$/.test(t)) return false;
  if (/^\d{1,2}\.\d{1,2}\.?$/.test(t)) return false;
  if (/^\d{1,2}:\d{2}$/.test(t)) return false;
  if (/^[WDL]$/.test(t)) return false;
  return t.length >= 3 && t.length <= 50;
}

function parseScore(line) {
  const nums = (line || "").match(/\b\d{1,2}\b/g);
  if (!nums || nums.length < 2) return null;
  const home = +nums[nums.length - 2];
  const away = +nums[nums.length - 1];
  if (home > 15 || away > 15) return null;
  return { home, away };
}

function extractFixtureCandidates(text) {
  const lines = text.split("\n").map(x => x.trim()).filter(Boolean);
  const candidates = [];

  for (let i = 0; i < lines.length - 1; i++) {
    const a = lines[i];
    const b = lines[i + 1];
    if (looksLikeTeam(a) && looksLikeTeam(b) && !sameTeam(a, b)) {
      candidates.push([a, b]);
    }
  }

  return candidates;
}

function detectMatchupFromHeaders(scanned) {
  const pairScore = new Map();

  for (const item of scanned) {
    const candidates = extractFixtureCandidates(item.text).slice(0, 8);
    for (const [a, b] of candidates) {
      const key = `${normalizeName(a)}|||${normalizeName(b)}`;
      pairScore.set(key, (pairScore.get(key) || 0) + 1);
    }
  }

  const ranked = [...pairScore.entries()].sort((a, b) => b[1] - a[1]);
  if (!ranked.length) return { home: "", away: "" };

  const best = ranked[0][0].split("|||");
  return { home: best[0], away: best[1] };
}

function assignImagesStrict(scanned, matchup) {
  const homeKey = normalizeName(matchup.home);
  const awayKey = normalizeName(matchup.away);

  const scored = scanned.map(item => {
    const t = normalizeName(item.text);

    const hasH2HHeader = t.includes("head to head matches") || t.includes("head to head");
    const hasHome = t.includes(homeKey);
    const hasAway = t.includes(awayKey);

    const fixturePairs = extractFixtureCandidates(item.text);
    const hasExactPair = fixturePairs.some(([a, b]) =>
      sameTeam(a, matchup.home) && sameTeam(b, matchup.away)
    ) || fixturePairs.some(([a, b]) =>
      sameTeam(a, matchup.away) && sameTeam(b, matchup.home)
    );

    const h2hScore =
      (hasH2HHeader ? 60 : 0) +
      (hasExactPair ? 30 : 0) +
      (hasHome ? 10 : 0) +
      (hasAway ? 10 : 0);

    const homeScore =
      (!hasH2HHeader ? 10 : -20) +
      (hasHome ? 30 : 0) +
      (hasAway ? 0 : 5);

    const awayScore =
      (!hasH2HHeader ? 10 : -20) +
      (hasAway ? 30 : 0) +
      (hasHome ? 0 : 5);

    return { ...item, h2hScore, homeScore, awayScore };
  });

  const h2h = [...scored].sort((a, b) => b.h2hScore - a.h2hScore)[0];
  const rest = scored.filter(x => x.file.name !== h2h.file.name);

  const home = [...rest].sort((a, b) => b.homeScore - a.homeScore)[0];
  const away = rest.find(x => x.file.name !== home.file.name);

  return { h2h, home, away };
}

function parseScreenshotStrict(text, homeTeam, awayTeam, type) {
  const lines = text.split("\n").map(x => x.trim()).filter(Boolean);
  const rows = [];

  for (let i = 0; i < lines.length - 4; i++) {
    const a = lines[i];
    const b = lines[i + 1];

    if (!looksLikeTeam(a) || !looksLikeTeam(b) || sameTeam(a, b)) continue;

    let foundScore = null;
    let scoreOffset = -1;

    for (let j = 2; j <= 5; j++) {
      const s = parseScore(lines[i + j] || "");
      if (s) {
        foundScore = s;
        scoreOffset = j;
        break;
      }
    }

    if (!foundScore) continue;

    let home = foundScore.home;
    let away = foundScore.away;

    if (type === "h2h") {
      const correct = sameTeam(a, homeTeam) && sameTeam(b, awayTeam);
      const reversed = sameTeam(a, awayTeam) && sameTeam(b, homeTeam);

      if (correct) {
        rows.push({ team1: homeTeam, team2: awayTeam, home, away, total: home + away });
      } else if (reversed) {
        rows.push({ team1: homeTeam, team2: awayTeam, home: away, away: home, total: home + away });
      }
      continue;
    }

    if (type === "home") {
      const trackedFirst = sameTeam(a, homeTeam);
      const trackedSecond = sameTeam(b, homeTeam);
      if (!trackedFirst && !trackedSecond) continue;

      if (trackedFirst) {
        rows.push({ team1: homeTeam, team2: b, home, away, total: home + away });
      } else {
        rows.push({ team1: homeTeam, team2: a, home: away, away: home, total: home + away });
      }
      continue;
    }

    if (type === "away") {
      const trackedFirst = sameTeam(a, awayTeam);
      const trackedSecond = sameTeam(b, awayTeam);
      if (!trackedFirst && !trackedSecond) continue;

      if (trackedSecond) {
        rows.push({ team1: a, team2: awayTeam, home, away, total: home + away });
      } else {
        rows.push({ team1: b, team2: awayTeam, home: away, away: home, total: home + away });
      }
      continue;
    }
  }

  return dedupeRows(rows).slice(0, 10);
}

function dedupeRows(rows) {
  const seen = new Set();
  const out = [];
  for (const r of rows) {
    const k = `${normalizeName(r.team1)}|${normalizeName(r.team2)}|${r.home}|${r.away}`;
    if (!seen.has(k)) {
      seen.add(k);
      out.push(r);
    }
  }
  return out;
}

function analyzePraxos({ homeTeam, awayTeam, h2hRows, homeRows, awayRows, threshold }) {
  const h2hStats = calcStats(h2hRows, "h2h");
  const homeStats = calcStats(homeRows, "home");
  const awayStats = calcStats(awayRows, "away");

  const homeStrength = 55 + homeStats.winRate * 22 + homeStats.avgScored * 8 - homeStats.failToScoreRate * 12;
  const awayStrength = 55 + awayStats.winRate * 22 + awayStats.avgScored * 8 - awayStats.failToScoreRate * 12;
  const drawTrap = h2hStats.drawRate * 20 + h2hStats.lowGoalDrawRate * 20 + ((homeStats.drawRate + awayStats.drawRate) * 10);
  const goalSignal = h2hStats.avgGoals * 0.25 + homeStats.avgGoals * 0.4 + awayStats.avgGoals * 0.35;
  const bttsSignal = h2hStats.bttsRate * 0.25 + homeStats.bttsRate * 0.4 + awayStats.bttsRate * 0.35;

  const primary = buildPrimary(homeStrength, awayStrength, drawTrap);
  const secondary = buildSecondary(goalSignal, bttsSignal);
  const markets = buildMarkets(primary, secondary, goalSignal, bttsSignal, drawTrap);
  const qualified = markets.filter(x => x.confidence >= threshold).sort((a, b) => b.confidence - a.confidence);

  const top = qualified[0]?.confidence || primary[0].confidence;
  const mode = top >= 78 ? "ATTACK" : top >= 70 ? "CONTROL" : "NO BET";
  const stake = top >= 78 ? "MEDIUM" : top >= 70 ? "SMALL" : "NO STAKE";
  const scores = buildScores(primary[0], secondary[0], drawTrap);

  return {
    homeTeam, awayTeam, mode, stake,
    primary, secondary, markets, qualified, scores
  };
}

function calcStats(rows, type) {
  const n = rows.length || 1;
  const avgGoals = rows.reduce((s, r) => s + r.total, 0) / n;
  const bttsRate = rows.filter(r => r.home > 0 && r.away > 0).length / n;
  const drawRate = rows.filter(r => r.home === r.away).length / n;
  const lowGoalDrawRate = rows.filter(r => r.home === r.away && r.total <= 2).length / n;

  let avgScored, winRate, failToScoreRate;
  if (type === "home") {
    avgScored = rows.reduce((s, r) => s + r.home, 0) / n;
    winRate = rows.filter(r => r.home > r.away).length / n;
    failToScoreRate = rows.filter(r => r.home === 0).length / n;
  } else if (type === "away") {
    avgScored = rows.reduce((s, r) => s + r.away, 0) / n;
    winRate = rows.filter(r => r.away > r.home).length / n;
    failToScoreRate = rows.filter(r => r.away === 0).length / n;
  } else {
    avgScored = rows.reduce((s, r) => s + r.home + r.away, 0) / (2 * n);
    winRate = 0;
    failToScoreRate = 0;
  }

  return { avgGoals, bttsRate, drawRate, lowGoalDrawRate, avgScored, winRate, failToScoreRate };
}

function buildPrimary(homeStrength, awayStrength, drawTrap) {
  let p = [];
  if (homeStrength > awayStrength + 5) {
    p = [
      { label: "1X", confidence: clamp(Math.round(homeStrength + 8 - drawTrap * 0.2), 50, 88) },
      { label: "1", confidence: clamp(Math.round(homeStrength - drawTrap * 0.25), 50, 84) }
    ];
  } else if (awayStrength > homeStrength + 5) {
    p = [
      { label: "X2", confidence: clamp(Math.round(awayStrength + 8 - drawTrap * 0.2), 50, 88) },
      { label: "2", confidence: clamp(Math.round(awayStrength - drawTrap * 0.25), 50, 84) }
    ];
  } else {
    p = [
      { label: "X", confidence: clamp(Math.round(58 + drawTrap * 0.5), 50, 82) },
      { label: "1X", confidence: clamp(Math.round(60 + (homeStrength - awayStrength)), 50, 84) }
    ];
  }
  return p.sort((a,b)=>b.confidence-a.confidence);
}

function buildSecondary(goalSignal, bttsSignal) {
  const s1 = goalSignal < 2.6
    ? { label: "Under 3.5", confidence: clamp(Math.round(60 + (2.6 - goalSignal) * 8), 50, 86) }
    : { label: "Over 2.5", confidence: clamp(Math.round(56 + (goalSignal - 2.6) * 8), 50, 84) };

  const s2 = bttsSignal > 0.52
    ? { label: "BTTS", confidence: clamp(Math.round(56 + (bttsSignal - 0.52) * 30), 50, 82) }
    : { label: "No BTTS", confidence: clamp(Math.round(56 + (0.52 - bttsSignal) * 30), 50, 82) };

  return [s1, s2];
}

function buildMarkets(primary, secondary, goalSignal, bttsSignal, drawTrap) {
  const p1 = primary[0], p2 = primary[1];
  const s1 = secondary[0], s2 = secondary[1];

  const out = [
    { label: p1.label, market: "Primary", confidence: p1.confidence },
    { label: p2.label, market: "Primary", confidence: p2.confidence },
    { label: s1.label, market: "Goals", confidence: s1.confidence },
    { label: s2.label, market: s2.label.includes("BTTS") ? "BTTS" : "Goals", confidence: s2.confidence },
  ];

  if (p1.label === "1X") out.push({ label:"Home +0.5", market:"Handicap", confidence: clamp(p1.confidence + 2, 50, 88) });
  if (p1.label === "X2") out.push({ label:"Away +0.5", market:"Handicap", confidence: clamp(p1.confidence + 2, 50, 88) });
  if (p1.label === "1") out.push({ label:"Home -0.25", market:"Handicap", confidence: clamp(p1.confidence - 2, 50, 82) });
  if (p1.label === "2") out.push({ label:"Away -0.25", market:"Handicap", confidence: clamp(p1.confidence - 2, 50, 82) });

  out.push({ label:`${p1.label} + ${s1.label}`, market:"Combo", confidence: clamp(Math.round((p1.confidence*0.55)+(s1.confidence*0.45)-2), 50, 88) });
  out.push({ label:`${p1.label} + ${s2.label}`, market:"Combo", confidence: clamp(Math.round((p1.confidence*0.55)+(s2.confidence*0.45)-2), 50, 88) });

  return out.sort((a,b)=>b.confidence-a.confidence);
}

function buildScores(primaryTop, secondaryTop, drawTrap) {
  let scores = [];

  if (primaryTop.label === "1") scores = ["1-0","2-0","2-1","3-1"];
  else if (primaryTop.label === "2") scores = ["0-1","0-2","1-2","1-3"];
  else if (primaryTop.label === "1X") scores = ["1-0","1-1","2-0","2-1"];
  else if (primaryTop.label === "X2") scores = ["0-1","1-1","0-2","1-2"];
  else scores = ["0-0","1-1","2-2","1-0"];

  if (secondaryTop.label === "Under 3.5") scores = scores.filter(s => totalGoals(s) <= 3);
  if (secondaryTop.label === "Over 2.5") scores = scores.filter(s => totalGoals(s) >= 3);
  if (secondaryTop.label === "BTTS") scores = scores.filter(s => bothTeamsScore(s));
  if (secondaryTop.label === "No BTTS") scores = scores.filter(s => !bothTeamsScore(s));

  if (drawTrap >= 18) scores.unshift("1-1");
  scores = unique(scores);

  while (scores.length < 4) scores.push("1-1");

  return scores.slice(0,4).map((s,i)=>({
    score:s,
    confidence:[76,71,66,61][i]
  }));
}

function totalGoals(s) {
  const [a,b] = s.split("-").map(Number);
  return a+b;
}

function bothTeamsScore(s) {
  const [a,b] = s.split("-").map(Number);
  return a>0 && b>0;
}

function unique(arr) {
  return [...new Set(arr)];
}

function clamp(n,min,max){ return Math.max(min, Math.min(max,n)); }

function renderResult(result) {
  els.modeStake.textContent = `${result.mode} / ${result.stake}`;

  els.primary.innerHTML = result.primary.map(renderCard).join("");
  els.secondary.innerHTML = result.secondary.map(renderCard).join("");
  els.scores.innerHTML = result.scores.map(s => `
    <div class="rounded-xl bg-black/20 p-3">
      <div class="text-lg font-black">${s.score}</div>
      <div class="soft text-sm">${s.confidence}%</div>
    </div>
  `).join("");

  els.qualified.innerHTML = result.qualified.length
    ? result.qualified.map(renderCard).join("")
    : `<div class="soft">No pick cleared 70%.</div>`;
}

function renderCard(m) {
  const cls = m.confidence >= 70 ? "good" : m.confidence >= 60 ? "warn" : "soft";
  return `
    <div class="rounded-xl bg-black/20 p-3">
      <div class="font-bold">${m.label}</div>
      <div class="soft text-sm">${m.market}</div>
      <div class="mt-2 text-xl font-black ${cls}">${m.confidence}%</div>
    </div>
  `;
}
</script>
</body>
</html>
