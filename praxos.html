<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Praxos Apex | Terminal Edition</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
    body { background:#03070b; color:#e2e8f0; font-family: 'JetBrains+Mono', monospace; }
    .glass { background:rgba(10, 15, 20, 0.95); border:1px solid rgba(16, 185, 129, 0.2); }
    .term-border { border-left: 4px solid #10b981; }
    .soft { color:#64748b; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }
    textarea:focus, input:focus, select:focus { outline: none; border-color: #10b981; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8">
  <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <div class="lg:col-span-4 space-y-6">
      <header class="mb-8 border-b border-emerald-500/20 pb-4">
        <h1 class="text-3xl font-black tracking-tighter text-white">PRAXOS <span class="text-emerald-500">APEX</span></h1>
        <p class="text-[10px] text-emerald-500/70 uppercase tracking-[0.2em] mt-1">Live Terminal Execution</p>
      </header>

      <div class="glass rounded-xl p-5">
        <h2 class="text-[11px] font-bold text-zinc-400 uppercase tracking-widest mb-4">Data Ingestion</h2>
        <input id="files" type="file" accept="image/*" multiple class="block w-full text-xs text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-bold file:bg-emerald-500/10 file:text-emerald-500 hover:file:bg-emerald-500/20 cursor-pointer mb-4" />

        <div id="roleBox" class="space-y-3 mb-4"></div>

        <button id="runBtn" class="w-full py-3 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-black font-black uppercase text-[11px] tracking-widest transition-all mb-4">
          Execute Framework
        </button>

        <div>
          <div class="flex justify-between text-[10px] font-bold text-emerald-500 uppercase mb-1">
            <span id="statusText">Awaiting Datasets...</span>
            <span id="progressText">0%</span>
          </div>
          <div class="h-1.5 w-full bg-zinc-900 rounded-full overflow-hidden">
            <div id="progressBar" class="h-full bg-emerald-500 w-0 transition-all duration-300"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="lg:col-span-8 flex flex-col h-full">
      <div class="glass rounded-xl p-6 flex flex-col h-full term-border relative">
        <div class="flex justify-between items-center mb-4 border-b border-emerald-500/20 pb-4">
          <h2 class="text-[12px] font-black text-emerald-500 uppercase tracking-widest">>> System Output</h2>
          <button id="copyBtn" class="text-[10px] bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 px-3 py-1.5 rounded uppercase font-bold transition-all">Copy Report</button>
        </div>
        
        <textarea id="terminal" readonly class="flex-grow w-full min-h-[500px] bg-transparent text-[13px] text-emerald-400 font-medium leading-relaxed resize-none" placeholder="INITIALIZING PRAXOS CORE...
AWAITING MULTI-TENSOR INGESTION."></textarea>
      </div>
    </div>

  </div>

<script>
const els = {
  files: document.getElementById("files"),
  roleBox: document.getElementById("roleBox"),
  runBtn: document.getElementById("runBtn"),
  copyBtn: document.getElementById("copyBtn"),
  terminal: document.getElementById("terminal"),
  progressBar: document.getElementById("progressBar"),
  progressText: document.getElementById("progressText"),
  statusText: document.getElementById("statusText"),
};

function logTerm(msg) { els.terminal.value = msg; }
function setProgress(v, text) {
  const n = Math.max(0, Math.min(100, Math.round(v)));
  els.progressBar.style.width = n + "%";
  els.progressText.textContent = n + "%";
  if(text) els.statusText.textContent = text;
}

els.files.addEventListener("change", () => {
  els.roleBox.innerHTML = "";
  const files = [...els.files.files];
  files.forEach((file, idx) => {
    const row = document.createElement("div");
    row.className = "flex gap-2 items-center";
    row.innerHTML = `
      <div class="text-[10px] text-zinc-400 truncate w-1/2">${file.name}</div>
      <select class="roleSelect flex-grow bg-black/50 border border-emerald-500/20 rounded px-2 py-1.5 text-[10px] text-emerald-500 uppercase font-bold" data-index="${idx}">
        <option value="">-- Role --</option>
        <option value="h2h">H2H Data</option>
        <option value="home">Home Form</option>
        <option value="away">Away Form</option>
      </select>
    `;
    els.roleBox.appendChild(row);
  });
});

els.copyBtn.onclick = () => {
  els.terminal.select();
  document.execCommand('copy');
  els.copyBtn.innerText = "COPIED!";
  setTimeout(() => els.copyBtn.innerText = "Copy Report", 2000);
};

els.runBtn.onclick = async () => {
  try {
    const files = [...els.files.files];
    if (files.length !== 3) return alert("Requires exactly 3 screenshots.");
    
    const roles = [...document.querySelectorAll(".roleSelect")].map(x => x.value);
    if (!roles.includes("h2h") || !roles.includes("home") || !roles.includes("away")) {
      return alert("Assign H2H, Home, and Away roles.");
    }

    logTerm(">> INGESTING NODE DATA...\n>> ACTIVATING TESSERACT OCR...");
    const scanned = [];
    for (let i = 0; i < files.length; i++) {
      setProgress((i/3)*100, `SCANNING IMAGE ${i+1}/3`);
      const text = await runOCR(files[i]);
      scanned.push({ role: roles[i], text });
    }
    setProgress(100, "PROCESSING LOGIC");

    const h2hText = scanned.find(x => x.role === "h2h").text;
    const homeText = scanned.find(x => x.role === "home").text;
    const awayText = scanned.find(x => x.role === "away").text;

    // Entity Detection
    const homeTeam = detectMainTeam(homeText) || "HOME_TEAM";
    const awayTeam = detectMainTeam(awayText) || "AWAY_TEAM";

    // Data Extraction
    const h2hRows = extractScoresSimple(h2hText, 8);
    const homeRows = extractScoresSimple(homeText, 8);
    const awayRows = extractScoresSimple(awayText, 8);

    // Praxos Engine
    const report = executePraxosLogic(homeTeam, awayTeam, h2hRows, homeRows, awayRows);
    logTerm(report);
    setProgress(100, "EXECUTION COMPLETE");

  } catch (err) {
    logTerm(">> FATAL ERROR: " + err.message);
  }
};

async function runOCR(file) {
  const res = await Tesseract.recognize(file, "eng");
  return res.data.text.replace(/\r/g, "\n").replace(/[|]/g, " ").replace(/[^ \S\n]+/g, " ").trim();
}

function detectMainTeam(text) {
  let clean = text.replace(/(Summary|Odds|H2H|Standings|Lineups|Advertisement|Stats|Video|Awarded)/gi, "");
  clean = clean.replace(/\b\d{1,2}\.\d{1,2}\.?\b/g, " ").replace(/\b20\d{2}\b/g, " ").replace(/\b\d+\b/g, " ").replace(/\b[WDL]\b/g, " ");
  
  const counts = {};
  clean.split('\n').forEach(line => {
    let t = line.trim();
    if (t.length > 3) counts[t] = (counts[t] || 0) + 1;
  });
  
  let top = "UNKNOWN"; let max = 0;
  for (let [k, v] of Object.entries(counts)) {
    if (v > max) { max = v; top = k; }
  }
  return top.toUpperCase();
}

function extractScoresSimple(text, limit) {
  const lines = text.split("\n").map(x => x.trim()).filter(Boolean);
  const rows = [];
  lines.forEach(line => {
    let clean = line.replace(/\b\d{1,2}\.\d{1,2}\.?\b/g, " ").replace(/\b20\d{2}\b/g, " ");
    let m;
    const rgx = [/(\d{1,2})\s*[-:]\s*(\d{1,2})/g, /\b(\d{1,2})\s+(\d{1,2})\b/g];
    rgx.forEach(r => {
      while ((m = r.exec(clean)) !== null) {
        let a = parseInt(m[1]), b = parseInt(m[2]);
        if (a<=12 && b<=12) rows.push({ h: a, a: b, t: a+b });
      }
    });
  });
  
  // Dedupe & Limit
  let unique = []; let seen = new Set();
  rows.forEach(r => {
    let key = `${r.h}-${r.a}`;
    if(!seen.has(key)) { seen.add(key); unique.push(r); }
  });
  return unique.slice(0, limit);
}

/* --- THE PRAXOS CORE ENGINE (CALIBRATED TO YOUR OUTPUT) --- */
function executePraxosLogic(homeName, awayName, h2h, home, away) {
  if(!h2h.length || !home.length || !away.length) return ">> ERROR: INSUFFICIENT DATA EXTRACTED. CHECK CROP.";

  // Analytics
  let h2hHomeWins = h2h.filter(r => r.h > r.a).length / h2h.length;
  let draws = h2h.filter(r => r.h === r.a).length / h2h.length;
  
  let avgGoals = (h2h.reduce((s,r)=>s+r.t,0)/h2h.length * 0.4) + 
                 (home.reduce((s,r)=>s+r.t,0)/home.length * 0.3) + 
                 (away.reduce((s,r)=>s+r.t,0)/away.length * 0.3);

  let bttsRate = (h2h.filter(r=>r.h>0 && r.a>0).length/h2h.length * 0.4) + 
                 (home.filter(r=>r.h>0 && r.a>0).length/home.length * 0.3) + 
                 (away.filter(r=>r.h>0 && r.a>0).length/away.length * 0.3);

  // Variable Assignments
  let primaryLabel = "";
  let primaryConf = 0;
  let secLabel = "";
  let secConf = 0;
  let sysNote = "";

  // 1. BOOGEYMAN / DOMINANCE CHECK
  if (h2hHomeWins >= 0.65) {
    primaryLabel = h2hHomeWins >= 0.8 ? `${homeName} Moneyline (1)` : `1X (Home Protection) / ${homeName} Moneyline (1)`;
    primaryConf = Math.floor(82 + (h2hHomeWins * 10)); // 88% - 92%
    sysNote = `*(System Note: Extreme Head-to-Head Boogeyman dominance by ${homeName} detected. Structural history overrides localized form fluctuations).*`;
  } 
  // 2. DRAW GRAVITY CHECK
  else if (draws >= 0.4) {
    primaryLabel = "Draw (X) Detected / X2 (Away Protection)";
    primaryConf = Math.floor(78 + (draws * 15));
    sysNote = `*(System Note: High Draw Gravity detected. Mutual inefficiency matrix is active).*`;
  } 
  // 3. STANDARD VARIANCE
  else {
    primaryLabel = "1X (Home) or X2 (Away) - Standard Variance";
    primaryConf = 75;
    sysNote = `*(System Note: No extreme structural anomaly detected. Proceed with standard bankroll limits).*`;
  }

  // SECONDARY CONSTRAINTS (GOALS)
  if (avgGoals > 2.6 || (avgGoals > 2.2 && bttsRate > 0.6)) {
    secLabel = bttsRate > 0.6 ? "Over 2.5 Goals / BTTS YES" : "Over 2.5 Goals";
    secConf = Math.floor(75 + (avgGoals * 4));
    if (secConf > 92) secConf = 90;
  } else {
    secLabel = bttsRate < 0.45 ? "Under 3.5 Goals / BTTS NO" : "Under 3.5 Goals";
    secConf = Math.floor(88 - (avgGoals * 2));
  }

  // Format exactly as requested
  return `**NODE: ${homeName} VS ${awayName}**
PRIMARY VECTOR:
Target: ${primaryLabel}
Confidence: ${primaryConf}%

SECONDARY CONSTRAINT:
Target: ${secLabel}
Confidence: ${secConf}%

${sysNote}`;
}
</script>
</body>
</html>
