<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantitative Match Simulator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        h1 { text-align: center; color: #38bdf8; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            background: #0f172a;
            padding: 20px;
            border-radius: 8px;
        }
        .control-group { display: flex; flex-direction: column; }
        label { font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #94a3b8; }
        .sub-label { font-size: 11px; color: #64748b; margin-bottom: 8px; font-style: italic; }
        
        input[type=number] { 
            width: 100%; 
            padding: 10px;
            background: #1e293b;
            border: 1px solid #334155;
            color: #f8fafc;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            box-sizing: border-box;
        }
        input[type=number]:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2);
        }
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            background: #334155;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .highlight { color: #38bdf8; font-weight: bold; }
        
        .results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .bar-container {
            background: #334155;
            border-radius: 6px;
            padding: 12px;
            display: flex;
            align-items: center;
        }
        .market-name { width: 220px; font-weight: 600; font-size: 15px; }
        .progress-track {
            flex-grow: 1;
            height: 12px;
            background: #0f172a;
            border-radius: 6px;
            overflow: hidden;
            margin: 0 15px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
            border-radius: 6px;
            transition: width 0.3s ease;
        }
        .percentage { width: 60px; text-align: right; font-weight: bold; color: #f8fafc; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧬 QUANTITATIVE MATCH SIMULATOR</h1>
    
    <div class="controls">
        <div class="control-group">
            <label>League Goal Velocity</label>
            <div class="sub-label">Base average per team</div>
            <input type="number" id="league_avg" min="0.5" max="3.0" step="0.05" value="1.40">
        </div>
        <div class="control-group">
            <label>Home Avg Scored</label>
            <div class="sub-label">Higher = Lethal Attack</div>
            <input type="number" id="h_scored" min="0.1" max="4.0" step="0.05" value="1.10">
        </div>
        <div class="control-group">
            <label>Away Avg Conceded</label>
            <div class="sub-label">Lower = Elite Defense</div>
            <input type="number" id="a_conceded" min="0.1" max="4.0" step="0.05" value="1.40">
        </div>
        <div class="control-group">
            <label>Away Avg Scored</label>
            <div class="sub-label">Higher = Lethal Attack</div>
            <input type="number" id="a_scored" min="0.1" max="4.0" step="0.05" value="1.20">
        </div>
        <div class="control-group">
            <label>Home Avg Conceded</label>
            <div class="sub-label">Lower = Elite Defense</div>
            <input type="number" id="h_conceded" min="0.1" max="4.0" step="0.05" value="0.80">
        </div>
    </div>

    <div class="dashboard-header">
        <div>Home Lambda (xG): <span class="highlight" id="home_xg">0.00</span></div>
        <div>🎯 COMPASS (Mode): <span class="highlight" id="compass_score">0-0</span></div>
        <div>Away Lambda (xG): <span class="highlight" id="away_xg">0.00</span></div>
    </div>

    <div class="results-grid" id="results_container">
        <!-- JS will populate bars here -->
    </div>
</div>

<script>
    // 1. Math Helpers
    function factorial(n) {
        if (n === 0 || n === 1) return 1;
        let result = 1;
        for (let i = 2; i <= n; i++) result *= i;
        return result;
    }
    
    function poisson(k, lambda) {
        return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k);
    }

    // 2. DOM Elements
    const inputs = ['league_avg', 'h_scored', 'a_conceded', 'a_scored', 'h_conceded'];
    const resultsContainer = document.getElementById('results_container');

    // Attach listeners
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', calculateEngine);
    });

    // 3. The Core Quantitative Engine
    function calculateEngine() {
        // Prevent empty inputs from breaking the math
        const v = parseFloat(document.getElementById('league_avg').value) || 0;
        const h_s = parseFloat(document.getElementById('h_scored').value) || 0;
        const a_c = parseFloat(document.getElementById('a_conceded').value) || 0;
        const a_s = parseFloat(document.getElementById('a_scored').value) || 0;
        const h_c = parseFloat(document.getElementById('h_conceded').value) || 0;

        // Expected Goals (Lambdas)
        const lambda_h = h_s * a_c * v;
        const lambda_a = a_s * h_c * v;

        document.getElementById('home_xg').innerText = lambda_h.toFixed(2);
        document.getElementById('away_xg').innerText = lambda_a.toFixed(2);

        // Grid Variables
        let best_score_prob = 0.0;
        let best_score = "0-0";

        let hw=0, aw=0, d=0, o15=0, o25=0, u35=0, btts=0, btts_no=0;
        let dc_1x=0, dc_x2=0, dc_12=0, d_o25=0;
        let ho05=0, ao05=0, ho15=0, ao15=0;

        // Populate Matrix (0 to 7 goals)
        for(let i=0; i<=7; i++) {
            for(let j=0; j<=7; j++) {
                let prob = poisson(i, lambda_h) * poisson(j, lambda_a);
                
                // Compass Mode Capture
                if(prob > best_score_prob) {
                    best_score_prob = prob;
                    best_score = `${i}-${j}`;
                }

                // Cumulative Logic
                if (i > j) hw += prob;
                else if (i < j) aw += prob;
                else d += prob;

                if (i + j > 1.5) o15 += prob;
                if (i + j > 2.5) o25 += prob;
                if (i + j < 3.5) u35 += prob;

                if (i > 0 && j > 0) btts += prob;
                else btts_no += prob;

                if (i >= j) dc_1x += prob;
                if (j >= i) dc_x2 += prob;
                if (i !== j) dc_12 += prob;
                if (i === j || (i + j > 2.5)) d_o25 += prob;

                if (i > 0) ho05 += prob;
                if (j > 0) ao05 += prob;
                if (i > 1) ho15 += prob;
                if (j > 1) ao15 += prob;
            }
        }

        // Draw No Bet logic
        let dnb_h = (hw + aw) > 0 ? (hw / (hw + aw)) : 0;
        let dnb_a = (hw + aw) > 0 ? (aw / (hw + aw)) : 0;

        document.getElementById('compass_score').innerText = `${best_score} (${(best_score_prob * 100).toFixed(1)}%)`;

        // Pack into array for sorting
        let markets = [
            { name: "Over 1.5", pct: o15 * 100 },
            { name: "Win or Draw (1X)", pct: dc_1x * 100 },
            { name: "Win or Draw (X2)", pct: dc_x2 * 100 },
            { name: "Home or Away to win (12)", pct: dc_12 * 100 },
            { name: "Under 3.5", pct: u35 * 100 },
            { name: "Home Over 0.5", pct: ho05 * 100 },
            { name: "Away Over 0.5", pct: ao05 * 100 },
            { name: "Draw No Bet (Home)", pct: dnb_h * 100 },
            { name: "Draw No Bet (Away)", pct: dnb_a * 100 },
            { name: "BTTS (Yes)", pct: btts * 100 },
            { name: "BTTS (No)", pct: btts_no * 100 },
            { name: "Over 2.5", pct: o25 * 100 },
            { name: "Draw or Over 2.5", pct: d_o25 * 100 },
            { name: "Winning Team (Home)", pct: hw * 100 },
            { name: "Winning Team (Away)", pct: aw * 100 },
            { name: "Home Over 1.5", pct: ho15 * 100 },
            { name: "Away Over 1.5", pct: ao15 * 100 },
            { name: "Draw", pct: d * 100 }
        ];

        // Sort Highest to Lowest
        markets.sort((a, b) => b.pct - a.pct);

        // Render Bars
        resultsContainer.innerHTML = '';
        markets.forEach(m => {
            let color = m.pct >= 75 ? 'linear-gradient(90deg, #059669, #10b981)' : 
                        m.pct >= 65 ? 'linear-gradient(90deg, #0ea5e9, #38bdf8)' : 
                        'linear-gradient(90deg, #475569, #64748b)';
            
            resultsContainer.innerHTML += `
                <div class="bar-container">
                    <div class="market-name">${m.name}</div>
                    <div class="progress-track">
                        <div class="progress-fill" style="width: ${m.pct.toFixed(1)}%; background: ${color}"></div>
                    </div>
                    <div class="percentage">${m.pct.toFixed(1)}%</div>
                </div>
            `;
        });
    }

    // Initial Load
    calculateEngine();
</script>
</body>
</html>
