<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Praxos Scanner</title>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{font-family:Arial;background:#0b0f1a;color:white;padding:20px}
.box{background:#111827;padding:15px;border-radius:10px;margin-bottom:15px}
button{padding:10px;background:#00c853;border:none;color:white;cursor:pointer}
</style>
</head>

<body>

<h2>Praxos Scanner</h2>

<div class="box">
<input type="file" id="files" multiple accept="image/*">
<br><br>
<button onclick="run()">Analyze</button>
</div>

<div class="box">
<pre id="output">Awaiting scan...</pre>
</div>

<div class="box">
<h3>History</h3>
<div id="history"></div>
</div>

<script>

// RUN
async function run(){

 const files = document.getElementById("files").files;

 if(files.length !== 3){
   alert("Upload exactly 3 images");
   return;
 }

 let texts = [];

 for(let f of files){
   let r = await Tesseract.recognize(f,'eng');
   texts.push(clean(r.data.text));
 }

 let structured = build(texts);
 let result = analyze(structured);

 show(result);
 save(result);
}

// CLEAN OCR
function clean(t){
 return t.replace(/O/g,"0").replace(/l/g,"1");
}

// PARSE
function extract(text){
 let regex=/(\d+)\s*[-:]\s*(\d+)/g;
 let m,arr=[];
 while((m=regex.exec(text))!==null){
   arr.push({h:+m[1],a:+m[2]});
 }
 return arr.slice(0,15);
}

// STATS
function stats(arr){
 let total=arr.length||1;
 let draws=arr.filter(x=>x.h===x.a).length;
 let goals=arr.reduce((s,x)=>s+x.h+x.a,0);
 let btts=arr.filter(x=>x.h>0&&x.a>0).length;

 return {
   avg:goals/total,
   draw:draws/total,
   btts:btts/total
 };
}

// STRUCTURE
function build(texts){
 let sets=texts.map(t=>extract(t));

 let drawRates=sets.map(s=>stats(s).draw);
 let h2hIndex=drawRates.indexOf(Math.max(...drawRates));

 let h2h=sets[h2hIndex];
 sets.splice(h2hIndex,1);

 let [a,b]=sets;

 let home=stats(a).avg>stats(b).avg?a:b;
 let away=home===a?b:a;

 return {h2h,home,away};
}

// ANALYZE
function analyze({h2h,home,away}){

 let H=stats(h2h);
 let Ho=stats(home);
 let Aw=stats(away);

 let drawSignal=(H.draw*0.3+Ho.draw*0.35+Aw.draw*0.35);
 let goalSignal=(H.avg*0.3+Ho.avg*0.35+Aw.avg*0.35);
 let bttsSignal=(H.btts*0.3+Ho.btts*0.35+Aw.btts*0.35);

 let mode="CONTROL";
 if(drawSignal>0.38) mode="CHAOS";
 if(goalSignal>3) mode="ATTACK";

 let primary = mode==="CHAOS"
   ? [{l:"X",c:60},{l:"X2",c:55}]
   : [{l:"X2",c:64},{l:"2",c:59}];

 let secondary=[
   goalSignal<2.5?{l:"Under 3.5",c:60}:{l:"Over 2.5",c:58},
   bttsSignal>0.5?{l:"BTTS",c:57}:{l:"BTTS NO",c:55}
 ];

 let scores = mode==="CHAOS"
   ? ["1-1","2-2","1-2","2-1"]
   : ["0-1","0-2","1-2","1-1"];

 return {mode,primary,secondary,scores,conf:primary[0].c};
}

// SHOW
function show(r){
 document.getElementById("output").innerText=`
Confidence: ${r.conf}%
Mode: ${r.mode}

PRIMARY:
• ${r.primary[0].l} (${r.primary[0].c}%)
• ${r.primary[1].l} (${r.primary[1].c}%)

SECONDARY:
• ${r.secondary[0].l} (${r.secondary[0].c}%)
• ${r.secondary[1].l} (${r.secondary[1].c}%)

SCORES:
• ${r.scores.join("\n• ")}
`;
}

// HISTORY
function save(r){
 let h=JSON.parse(localStorage.getItem("praxos")||"[]");

 h.unshift({
   time:new Date().toLocaleString(),
   pick:r.primary[0].l,
   conf:r.conf
 });

 localStorage.setItem("praxos",JSON.stringify(h.slice(0,10)));
 load();
}

function load(){
 let h=JSON.parse(localStorage.getItem("praxos")||"[]");

 document.getElementById("history").innerHTML=
 h.map(x=>`<div>${x.time} — ${x.pick} (${x.conf}%)</div>`).join("");
}

load();

</script>

</body>
</html>
