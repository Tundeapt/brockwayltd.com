<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praxos V5.2</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body {
    background:#0a0a0b;
    color:#e4e4e7;
    font-family: monospace;
}
.glass {
    background:rgba(23,23,27,0.85);
    border:1px solid rgba(255,255,255,0.1);
}
</style>
</head>

<body class="p-6">

<div class="max-w-4xl mx-auto space-y-6">

<h1 class="text-2xl font-bold">PRAXOS V5.2 — SMART SCANNER</h1>

<div class="glass p-6 rounded space-y-4">

<input type="file" id="files" multiple accept="image/*"
class="w-full p-2 bg-black border border-gray-700 rounded">

<p class="text-xs text-gray-400">
Upload ANY 3 images (H2H + both teams — order doesn’t matter)
</p>

<button onclick="scanAll()"
class="w-full bg-emerald-600 p-3 rounded font-bold">
Run Scan
</button>

</div>

<div id="output" class="glass p-6 rounded text-center">
Awaiting Scan...
</div>

</div>

<script>

// OCR
async function readImage(file) {
    const result = await Tesseract.recognize(file, 'eng');
    return result.data.text.toLowerCase();
}

// Extract main teams
function extractTeams(texts) {
    let words = {};

    texts.forEach(text => {
        let tokens = text.split(/\s+/);
        tokens.forEach(w => {
            if (w.length > 3) {
                words[w] = (words[w] || 0) + 1;
            }
        });
    });

    let sorted = Object.entries(words)
        .sort((a,b) => b[1]-a[1])
        .map(x => x[0]);

    return sorted.slice(0, 2);
}

// Classify images automatically
function classifyImages(texts, teamA, teamB) {
    let h2h, home, away;

    texts.forEach(text => {
        let hasA = text.includes(teamA);
        let hasB = text.includes(teamB);

        if (hasA && hasB) {
            h2h = text;
        } else if (hasA) {
            home = text;
        } else if (hasB) {
            away = text;
        }
    });

    return {h2h, home, away};
}

// Count helper
function count(pattern, text) {
    return (text.match(pattern) || []).length;
}

// Main scan
async function scanAll() {
    const files = document.getElementById("files").files;

    if (files.length !== 3) {
        alert("Upload exactly 3 images");
        return;
    }

    document.getElementById("output").innerHTML = "Reading images...";

    let texts = [];

    for (let f of files) {
        texts.push(await readImage(f));
    }

    const [teamA, teamB] = extractTeams(texts);

    const {h2h, home, away} = classifyImages(texts, teamA, teamB);

    runEngine(h2h, home, away, teamA, teamB);
}

// Engine
function runEngine(h2h, home, away, teamA, teamB) {

    let score = 50;
    let notes = [];

    let wins = count(/0-1|0-2|1-2/g, h2h || "");
    let draws = count(/1-1|0-0/g, (home||"") + (away||""));
    let highGoals = count(/3-|4-|5-|6-/g, (home||"") + (away||""));

    let boogey = wins >= 2;
    let drawEngine = draws >= 4;
    let chaos = highGoals >= 4;

    if (boogey) { score += 15; notes.push("Boogeyman"); }
    if (drawEngine) { score += 10; notes.push("Draw Engine"); }
    if (chaos) { score += 12; notes.push("Chaos"); }

    let conflict = drawEngine && chaos;
    if (conflict) {
        score -= 15;
        notes.push("Conflict");
    }

    let mode = "CONTROL";
    if (drawEngine && !boogey) mode = "DRAW ENGINE";
    if (chaos && boogey) mode = "CHAOS DOMINANCE";
    if (chaos && !boogey) mode = "PURE CHAOS";

    score = Math.max(60, Math.min(92, score));
    let verdict = score >= 75 && !conflict ? "BET" : "NO BET";

    let outcomes = [];

    if (mode === "DRAW ENGINE") {
        outcomes.push({name:"Draw", conf: score});
        outcomes.push({name:"Under 2.5", conf: score-5});
    }

    if (mode === "CONTROL") {
        outcomes.push({name:"X2", conf: score});
        outcomes.push({name:"Under 3.5", conf: score-6});
    }

    if (mode === "CHAOS DOMINANCE") {
        outcomes.push({name:`${teamA} Win`, conf: score});
        outcomes.push({name:"Over 2.5", conf: score-5});
    }

    if (mode === "PURE CHAOS") {
        outcomes.push({name:"Over 2.5", conf: score});
        outcomes.push({name:"BTTS", conf: score-5});
        outcomes.push({name:"Over 3.5", conf: score-8});
    }

    document.getElementById("output").innerHTML = `
        <h2 class="text-xl font-bold">${teamA} vs ${teamB}</h2>

        <div class="text-4xl text-emerald-400 font-black">${score}%</div>
        <p>${verdict}</p>
        <p class="text-sm text-gray-400">Mode: ${mode}</p>

        <div class="mt-3 text-left">
            ${notes.map(n => `<div>• ${n}</div>`).join("")}
        </div>

        <div class="mt-4 bg-black p-4 rounded text-left">
            <p class="font-bold mb-2">Outcomes:</p>
            ${outcomes.map(o => `<div>• ${o.name} (${o.conf}%)</div>`).join("")}
        </div>

        <div class="mt-4 font-bold text-emerald-400">
            ${verdict === "BET" ? "STAKE APPROVED" : "NO STAKE"}
        </div>
    `;
}

</script>

</body>
</html>
