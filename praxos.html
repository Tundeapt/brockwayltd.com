<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Praxos Apex | Terminal v1.8</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
    body { background:#03070b; color:#e2e8f0; font-family: 'JetBrains+Mono', monospace; }
    .glass { background:rgba(10, 15, 20, 0.95); border:1px solid rgba(16, 185, 129, 0.2); }
    .term-border { border-left: 4px solid #10b981; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 4px; }
    textarea:focus, input:focus, select:focus { outline: none; border-color: #10b981; }
  </style>
</head>
<body class="min-h-screen p-4 md:p-8">
  <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8">
    
    <div class="lg:col-span-4 space-y-6">
      <header class="mb-8 border-b border-emerald-500/20 pb-4">
        <h1 class="text-3xl font-black tracking-tighter text-white">PRAXOS <span class="text-emerald-500">APEX</span></h1>
        <p class="text-[10px] text-emerald-500/70 uppercase tracking-[0.2em] mt-1">v1.8 Lattice Engine [FINAL]</p>
      </header>

      <div class="glass rounded-xl p-5">
        <h2 class="text-[11px] font-bold text-zinc-400 uppercase tracking-widest mb-4">Data Ingestion</h2>
        <input id="files" type="file" accept="image/*" multiple class="block w-full text-xs text-zinc-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-xs file:font-bold file:bg-emerald-500/10 file:text-emerald-500 hover:file:bg-emerald-500/20 cursor-pointer mb-6" />
        <button id="runBtn" class="w-full py-4 rounded-lg bg-emerald-600 hover:bg-emerald-500 text-black font-black uppercase text-[12px] tracking-[0.2em] transition-all mb-4 shadow-[0_0_15px_rgba(16,185,129,0.3)]">Execute Framework</button>
        <div class="flex justify-between text-[10px] font-bold text-emerald-500 uppercase mb-1">
          <span id="statusText">Awaiting Tensors</span>
          <span id="progressText">0%</span>
        </div>
        <div class="h-1.5 w-full bg-zinc-900 rounded-full overflow-hidden">
          <div id="progressBar" class="h-full bg-emerald-500 w-0 transition-all shadow-[0_0_10px_#10b981]"></div>
        </div>
      </div>
    </div>

    <div class="lg:col-span-8 flex flex-col h-full">
      <div class="glass rounded-xl p-6 flex flex-col h-full term-border relative">
        <div class="flex justify-between items-center mb-4 border-b border-emerald-500/20 pb-4">
          <h2 class="text-[12px] font-black text-emerald-500 uppercase tracking-widest">>> System Output</h2>
          <button id="copyBtn" class="text-[10px] bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 px-3 py-1.5 rounded uppercase font-bold">Copy Report</button>
        </div>
        <textarea id="terminal" readonly class="flex-grow w-full min-h-[500px] bg-transparent text-[13px] text-emerald-400 font-medium leading-relaxed resize-none" placeholder="AWAITING INGESTION..."></textarea>
      </div>
    </div>
  </div>

<script>
const els = { files: document.getElementById("files"), runBtn: document.getElementById("runBtn"), copyBtn: document.getElementById("copyBtn"), terminal: document.getElementById("terminal"), progressBar: document.getElementById("progressBar"), progressText: document.getElementById("progressText"), statusText: document.getElementById("statusText") };
function logTerm(msg) { els.terminal.value = msg; }
function setProgress(v, text) { let n = Math.round(v); els.progressBar.style.width = n + "%"; els.progressText.textContent = n + "%"; if(text) els.statusText.textContent = text; }

els.runBtn.onclick = async () => {
  try {
    const files = [...els.files.files];
    if (files.length !== 3) return alert("Upload 3 images.");
    logTerm(">> BOOTING OCR ARRAY...");
    const texts = [];
    for (let i = 0; i < files.length; i++) {
      setProgress((i/3)*100, `SCANNING ${i+1}/3`);
      const res = await Tesseract.recognize(files[i], "eng");
      texts.push(res.data.text.replace(/\r/g, "\n").trim());
    }
    setProgress(90, "CALIBRATING LATTICE");
    const sorted = autoSortDatasets(texts);
    const modernH2HText = truncateDeadZones(sorted.h2hText);
    const h2h = extractScoresRobust(modernH2HText, 10);
    const home = extractScoresRobust(sorted.homeText, 10);
    const away = extractScoresRobust(sorted.awayText, 10);
    logTerm(executePraxosLogic(sorted.homeName, sorted.awayName, h2h, home, away));
    setProgress(100, "COMPLETE");
  } catch (err) { logTerm(">> FATAL ERROR: " + err.message); }
};

function truncateDeadZones(text) {
   let chunks = text.split(/\b(20\d{2})\b/);
   if (chunks.length === 1) return text; 
   let valid = chunks[0];
   for(let i=1; i<chunks.length; i+=2) { if (parseInt(chunks[i]) >= 2023) valid += " " + chunks[i+1]; }
   return valid;
}

function autoSortDatasets(texts) {
  // Improved Naming: Identify entities by looking for repeating multi-word lines
  let entityPool = [];
  texts.forEach(t => {
    let lines = t.split('\n').map(l => l.trim().toUpperCase());
    lines.forEach(l => {
        let cleanLine = l.replace(/[^A-Z\s]/g, "").trim();
        if(cleanLine.length > 3 && !/SUMMARY|ODDS|STANDINGS|NEWS|LINEUPS|H2H/.test(cleanLine)) {
            entityPool.push(cleanLine);
        }
    });
  });

  const counts = {};
  entityPool.forEach(e => counts[e] = (counts[e] || 0) + 1);
  let sortedEntities = Object.keys(counts).sort((a,b) => counts[b] - counts[a]);
  
  let tA = sortedEntities[0] || "TEAM_A";
  let tB = sortedEntities[1] || "TEAM_B";

  // Match text to H2H by presence of both names
  let h2hIdx = texts.map(t => {
      let upper = t.toUpperCase();
      return (upper.includes(tA) && upper.includes(tB)) ? 2 : (upper.includes(tA) || upper.includes(tB) ? 1 : 0);
  }).indexOf(2);

  if(h2hIdx === -1) h2hIdx = 0; // Fallback

  let h2hText = texts[h2hIdx];
  let remaining = texts.filter((_,i)=>i!==h2hIdx);
  
  let isTeamAHome = remaining[0].toUpperCase().includes(tA);
  let tAText = isTeamAHome ? remaining[0] : remaining[1], tBText = isTeamAHome ? remaining[1] : remaining[0];
  
  let posA = h2hText.toUpperCase().indexOf(tA), posB = h2hText.toUpperCase().indexOf(tB);
  return (posA < posB) ? {h2hText, homeText:tAText, awayText:tBText, homeName:tA, awayName:tB} : {h2hText, homeText:tBText, awayText:tAText, homeName:tB, awayName:tA};
}

function extractScoresRobust(text, limit) {
  let rows = [];
  let clean = text.replace(/\b\d{1,2}\.\d{1,2}\.?\b/g, " ").replace(/\b(19|20)\d{2}\b/g, " ");
  const lines = clean.split("\n").map(x => x.trim()).filter(Boolean);
  lines.forEach(line => {
    let m = line.match(/(\d{1,2})\s*[-: ]\s*(\d{1,2})/);
    if (m) { let a = parseInt(m[1]), b = parseInt(m[2]); if (a <= 9 && b <= 9) rows.push({ h: a, a: b, t: a+b }); }
  });
  if (rows.length === 0) {
      let nums = []; lines.forEach(l => { let m = l.match(/\s+(\d{1,2})$|^(\d{1,2})$/); if(m) nums.push(parseInt(m[1]||m[2])); });
      for(let i=0; i<nums.length-1; i+=2) { if(nums[i]<=9 && nums[i+1]<=9) rows.push({h:nums[i], a:nums[i+1], t:nums[i]+nums[i+1]}); }
  }
  return rows.slice(0, limit);
}

function executePraxosLogic(homeName, awayName, h2h, home, away) {
  if(home.length < 2 || away.length < 2) return ">> ERROR: INSUFFICIENT DATA.";
  let voidH2H = h2h.length === 0, sysNote = "";
  if (voidH2H) sysNote = "*(System Note: 🚨 TEMPORAL ENGINE TRIGGERED 🚨).*";
  
  let h2hHomeWins = voidH2H ? 0 : h2h.filter(r => r.h > r.a).length / h2h.length;
  let h2hAwayWins = voidH2H ? 0 : h2h.filter(r => r.a > r.h).length / h2h.length;
  let draws = voidH2H ? 0 : h2h.filter(r => r.h === r.a).length / h2h.length;
  
  let h2hAvg = voidH2H ? 0 : (h2h.reduce((s,r)=>s+r.t,0)/h2h.length);
  let homeAvg = home.reduce((s,r)=>s+r.t,0)/home.length;
  let awayAvg = away.reduce((s,r)=>s+r.t,0)/away.length;
  let macroAvg = (homeAvg * 0.5) + (awayAvg * 0.5);
  
  let avgG = voidH2H ? macroAvg : (h2hAvg * 0.45) + (macroAvg * 0.55);
  let btts = voidH2H ? 0.5 : (h2h.filter(r=>r.h>0 && r.a>0).length/h2h.length * 0.4) + 0.3;

  let primaryLabel = "1X (Home) or X2 (Away) - Standard Variance", primaryConf = 75;
  
  if (!voidH2H && (h2hHomeWins >= 0.65 || h2hAwayWins >= 0.65)) {
    let dominant = h2hHomeWins > h2hAwayWins ? homeName : awayName;
    let vector = h2hHomeWins > h2hAwayWins ? "1" : "2";
    let protection = h2hHomeWins > h2hAwayWins ? "1X" : "X2";
    primaryLabel = Math.max(h2hHomeWins, h2hAwayWins) >= 0.8 ? `${dominant} Moneyline (${vector})` : `${protection} / ${dominant} Moneyline (${vector})`;
    primaryConf = Math.min(98, Math.floor(82 + (Math.max(h2hHomeWins, h2hAwayWins) * 10)));
    sysNote += (sysNote ? "\n" : "") + `*(System Note: 🚨 BOOGEYMAN DETECTED 🚨. Structural dominance by ${dominant}).*`;
  } else if (draws >= 0.4) {
    let side = h2hHomeWins >= h2hAwayWins ? "1X (Home Protection)" : "X2 (Away Protection)";
    primaryLabel = `Draw (X) Detected / ${side}`;
    primaryConf = Math.min(98, Math.floor(78 + (draws * 15)));
    sysNote += (sysNote ? "\n" : "") + "*(System Note: 🚨 DRAW GRAVITY 🚨).*";
  }

  let secLabel = "", secConf = 0;
  let frictionVeto = (!voidH2H && h2hAvg <= 2.2 && macroAvg >= 2.8);
  if (frictionVeto) {
    secLabel = "Under 3.5 Goals / BTTS NO"; secConf = 85;
    sysNote += (sysNote ? "\n" : "") + "*(System Note: 🚨 FRICTION VETO 🚨).*";
  } else if (avgG > 2.6) {
    secLabel = btts > 0.6 ? "Over 2.5 Goals / BTTS YES" : "Over 2.5 Goals"; 
    secConf = Math.min(99, Math.floor(75 + (avgG * 4)));
  } else {
    secLabel = "Under 3.5 Goals / BTTS NO"; secConf = 85;
  }

  if (sysNote === "") sysNote = "*(System Note: No extreme structural anomaly detected).*";
  return `**NODE: ${homeName} VS ${awayName}**\n\nPRIMARY VECTOR:\nTarget: ${primaryLabel}\nConfidence: ${primaryConf}%\n\nSECONDARY CONSTRAINT:\nTarget: ${secLabel}\nConfidence: ${secConf}%\n\n${sysNote}`;
}
els.copyBtn.onclick = () => { els.terminal.select(); document.execCommand('copy'); els.copyBtn.innerText = "COPIED!"; setTimeout(() => els.copyBtn.innerText = "Copy", 2000); };
</script>
</body>
</html>
