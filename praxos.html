<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praxos Quantitative Board Simulator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            background: #1e293b;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        h1 { text-align: center; color: #38bdf8; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            background: #0f172a;
            padding: 20px;
            border-radius: 8px;
        }
        .control-group { display: flex; flex-direction: column; }
        label { font-size: 14px; font-weight: 600; margin-bottom: 8px; color: #94a3b8; }
        input[type=range] { width: 100%; cursor: pointer; }
        .val-display { font-size: 18px; font-weight: bold; color: #e2e8f0; margin-top: 5px;}
        
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            background: #334155;
            padding: 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 18px;
        }
        .highlight { color: #38bdf8; font-weight: bold; }
        
        .results-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }
        .bar-container {
            background: #334155;
            border-radius: 6px;
            padding: 12px;
            display: flex;
            align-items: center;
        }
        .market-name { width: 220px; font-weight: 600; font-size: 15px; }
        .progress-track {
            flex-grow: 1;
            height: 12px;
            background: #0f172a;
            border-radius: 6px;
            overflow: hidden;
            margin: 0 15px;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
            border-radius: 6px;
            transition: width 0.3s ease;
        }
        .percentage { width: 60px; text-align: right; font-weight: bold; color: #f8fafc; }
    </style>
</head>
<body>

<div class="container">
    <h1>🧬 PRAXOS QUANTITATIVE SIMULATOR</h1>
    
    <div class="controls">
        <div class="control-group">
            <label>League Goal Velocity</label>
            <input type="range" id="league_avg" min="1.0" max="2.0" step="0.01" value="1.4">
            <span class="val-display" id="val_league_avg">1.40</span>
        </div>
        <div class="control-group">
            <label>Home Attack (h_atk)</label>
            <input type="range" id="h_atk" min="0.5" max="2.5" step="0.01" value="1.1">
            <span class="val-display" id="val_h_atk">1.10</span>
        </div>
        <div class="control-group">
            <label>Away Defense (a_def)</label>
            <input type="range" id="a_def" min="0.5" max="2.5" step="0.01" value="1.4">
            <span class="val-display" id="val_a_def">1.40</span>
        </div>
        <div class="control-group">
            <label>Away Attack (a_atk)</label>
            <input type="range" id="a_atk" min="0.5" max="2.5" step="0.01" value="1.2">
            <span class="val-display" id="val_a_atk">1.20</span>
        </div>
        <div class="control-group">
            <label>Home Defense (h_def)</label>
            <input type="range" id="h_def" min="0.5" max="2.5" step="0.01" value="0.8">
            <span class="val-display" id="val_h_def">0.80</span>
        </div>
    </div>

    <div class="dashboard-header">
        <div>Home Lambda (xG): <span class="highlight" id="home_xg">0.00</span></div>
        <div>🎯 COMPASS (Mode): <span class="highlight" id="compass_score">0-0</span></div>
        <div>Away Lambda (xG): <span class="highlight" id="away_xg">0.00</span></div>
    </div>

    <div class="results-grid" id="results_container">
        <!-- JS will populate bars here -->
    </div>
</div>

<script>
    // 1. Math Helpers
    function factorial(n) {
        if (n === 0 || n === 1) return 1;
        let result = 1;
        for (let i = 2; i <= n; i++) result *= i;
        return result;
    }
    
    function poisson(k, lambda) {
        return (Math.pow(lambda, k) * Math.exp(-lambda)) / factorial(k);
    }

    // 2. DOM Elements
    const inputs = ['league_avg', 'h_atk', 'a_def', 'a_atk', 'h_def'];
    const resultsContainer = document.getElementById('results_container');

    // Attach listeners
    inputs.forEach(id => {
        document.getElementById(id).addEventListener('input', (e) => {
            document.getElementById(`val_${id}`).innerText = parseFloat(e.target.value).toFixed(2);
            calculateEngine();
        });
    });

    // 3. The Core Praxos Engine
    function calculateEngine() {
        const v = parseFloat(document.getElementById('league_avg').value);
        const ha = parseFloat(document.getElementById('h_atk').value);
        const ad = parseFloat(document.getElementById('a_def').value);
        const aa = parseFloat(document.getElementById('a_atk').value);
        const hd = parseFloat(document.getElementById('h_def').value);

        // Expected Goals (Lambdas)
        const lambda_h = ha * ad * v;
        const lambda_a = aa * hd * v;

        document.getElementById('home_xg').innerText = lambda_h.toFixed(2);
        document.getElementById('away_xg').innerText = lambda_a.toFixed(2);

        // Grid Variables
        let best_score_prob = 0.0;
        let best_score = "0-0";

        let hw=0, aw=0, d=0, o15=0, o25=0, u35=0, btts=0, btts_no=0;
        let dc_1x=0, dc_x2=0, dc_12=0, d_o25=0;
        let ho05=0, ao05=0, ho15=0, ao15=0;

        // Populate Matrix (0 to 7 goals)
        for(let i=0; i<=7; i++) {
            for(let j=0; j<=7; j++) {
                let prob = poisson(i, lambda_h) * poisson(j, lambda_a);
                
                // Compass
                if(prob > best_score_prob) {
                    best_score_prob = prob;
                    best_score = `${i}-${j}`;
                }

                // Cumulative Logic
                if (i > j) hw += prob;
                else if (i < j) aw += prob;
                else d += prob;

                if (i + j > 1.5) o15 += prob;
                if (i + j > 2.5) o25 += prob;
                if (i + j < 3.5) u35 += prob;

                if (i > 0 && j > 0) btts += prob;
                else btts_no += prob;

                if (i >= j) dc_1x += prob;
                if (j >= i) dc_x2 += prob;
                if (i !== j) dc_12 += prob;
                if (i === j || (i + j > 2.5)) d_o25 += prob;

                if (i > 0) ho05 += prob;
                if (j > 0) ao05 += prob;
                if (i > 1) ho15 += prob;
                if (j > 1) ao15 += prob;
            }
        }

        // Draw No Bet logic
        let dnb_h = (hw + aw) > 0 ? (hw / (hw + aw)) : 0;
        let dnb_a = (hw + aw) > 0 ? (aw / (hw + aw)) : 0;

        document.getElementById('compass_score').innerText = `${best_score} (${(best_score_prob * 100).toFixed(1)}%)`;

        // Pack into array for sorting
        let markets = [
            { name: "Over 1.5", pct: o15 * 100 },
            { name: "Win or Draw (1X)", pct: dc_1x * 100 },
            { name: "Win or Draw (X2)", pct: dc_x2 * 100 },
            { name: "Home or Away to win (12)", pct: dc_12 * 100 },
            { name: "Under 3.5", pct: u35 * 100 },
            { name: "Home Over 0.5", pct: ho05 * 100 },
            { name: "Away Over 0.5", pct: ao05 * 100 },
            { name: "Draw No Bet (Home)", pct: dnb_h * 100 },
            { name: "Draw No Bet (Away)", pct: dnb_a * 100 },
            { name: "BTTS (Yes)", pct: btts * 100 },
            { name: "BTTS (No)", pct: btts_no * 100 },
            { name: "Over 2.5", pct: o25 * 100 },
            { name: "Draw or Over 2.5", pct: d_o25 * 100 },
            { name: "Winning Team (Home)", pct: hw * 100 },
            { name: "Winning Team (Away)", pct: aw * 100 },
            { name: "Home Over 1.5", pct: ho15 * 100 },
            { name: "Away Over 1.5", pct: ao15 * 100 },
            { name: "Draw", pct: d * 100 }
        ];

        // Sort Highest to Lowest
        markets.sort((a, b) => b.pct - a.pct);

        // Render
        resultsContainer.innerHTML = '';
        markets.forEach(m => {
            let color = m.pct >= 75 ? 'linear-gradient(90deg, #059669, #10b981)' : 
                        m.pct >= 65 ? 'linear-gradient(90deg, #0ea5e9, #38bdf8)' : 
                        'linear-gradient(90deg, #475569, #64748b)';
            
            resultsContainer.innerHTML += `
                <div class="bar-container">
                    <div class="market-name">${m.name}</div>
                    <div class="progress-track">
                        <div class="progress-fill" style="width: ${m.pct.toFixed(1)}%; background: ${color}"></div>
                    </div>
                    <div class="percentage">${m.pct.toFixed(1)}%</div>
                </div>
            `;
        });
    }

    // Initial Load
    calculateEngine();
</script>
</body>
</html>
