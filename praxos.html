<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Praxos Vision | OCR Data Extraction</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { font-family: 'JetBrains+Mono', monospace; background-color: #0d0d0f; color: #e2e8f0; }
        .glass { background: rgba(18, 18, 21, 0.8); backdrop-filter: blur(14px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .scanner-line { 
            position: absolute; width: 100%; height: 2px; background: rgba(16, 185, 129, 0.8); 
            box-shadow: 0 0 10px #10b981; top: 0; left: 0; 
            animation: scan 2s cubic-bezier(0.4, 0, 0.2, 1) infinite; display: none;
        }
        @keyframes scan { 0% { top: 0%; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #10b981; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen p-4 md:p-10">

    <div class="max-w-6xl mx-auto">
        <header class="flex justify-between items-end mb-10 border-b border-emerald-500/10 pb-6">
            <div>
                <h1 class="text-4xl font-black tracking-tighter text-white">PRAXOS <span class="text-emerald-500 text-sm font-normal px-2 py-1 bg-emerald-500/10 rounded ml-2">VISION API</span></h1>
                <p class="text-zinc-500 text-[10px] mt-2 uppercase tracking-[0.3em]">Client-Side Optical Character Recognition</p>
            </div>
            <div class="flex items-center gap-2 text-emerald-500 text-[10px] font-bold uppercase">
                <i class="fa-solid fa-satellite-dish animate-pulse"></i> Tesseract Engine Ready
            </div>
        </header>

        <main class="grid grid-cols-1 lg:grid-cols-2 gap-8">
            
            <section class="space-y-6">
                <div class="glass p-6 rounded-2xl relative overflow-hidden">
                    <h2 class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                        <i class="fa-solid fa-camera-retro text-emerald-500"></i> Image Target
                    </h2>
                    
                    <div id="drop-zone" class="border-2 border-dashed border-zinc-800 rounded-xl p-8 text-center hover:border-emerald-500/50 transition-all cursor-pointer bg-black/40 relative">
                        <input type="file" id="file-input" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="image/*">
                        <i class="fa-solid fa-image text-4xl text-zinc-700 mb-3 block" id="upload-icon"></i>
                        <p class="text-xs text-zinc-400 font-bold uppercase tracking-widest" id="upload-text">Select Screenshot</p>
                    </div>

                    <div id="preview-container" class="mt-4 relative rounded-xl overflow-hidden hidden border border-white/10">
                        <img id="image-preview" class="w-full h-auto opacity-50" src="" alt="Target">
                        <div id="scanner" class="scanner-line"></div>
                    </div>

                    <div id="progress-container" class="mt-4 hidden space-y-2">
                        <div class="flex justify-between text-[9px] text-emerald-500 font-bold uppercase tracking-widest">
                            <span id="status-text">Initializing Engine...</span>
                            <span id="progress-pct">0%</span>
                        </div>
                        <div class="w-full bg-zinc-900 h-1.5 rounded-full overflow-hidden">
                            <div id="progress-bar" class="bg-emerald-500 h-full w-0 transition-all duration-300 shadow-[0_0_10px_#10b981]"></div>
                        </div>
                    </div>
                </div>
            </section>

            <section>
                <div class="glass p-6 rounded-2xl h-full flex flex-col border-l-4 border-l-emerald-500">
                    <div class="flex justify-between items-center mb-4">
                        <h2 class="text-[10px] font-black text-emerald-500 uppercase tracking-[0.2em] flex items-center gap-2">
                            <i class="fa-solid fa-terminal"></i> Raw Data Output
                        </h2>
                        <button onclick="copyData()" class="text-[9px] text-zinc-500 hover:text-white transition uppercase tracking-widest bg-white/5 px-2 py-1 rounded">Copy Data</button>
                    </div>
                    
                    <div class="flex-grow bg-[#050505] rounded-xl border border-white/5 p-4 relative">
                        <textarea id="output-log" readonly class="w-full h-full min-h-[300px] bg-transparent text-xs text-emerald-400 focus:outline-none resize-none placeholder:text-zinc-700 leading-relaxed" placeholder="AWAITING IMAGE INGESTION..."></textarea>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const previewContainer = document.getElementById('preview-container');
        const imagePreview = document.getElementById('image-preview');
        const scanner = document.getElementById('scanner');
        const progressContainer = document.getElementById('progress-container');
        const progressBar = document.getElementById('progress-bar');
        const progressPct = document.getElementById('progress-pct');
        const statusText = document.getElementById('status-text');
        const outputLog = document.getElementById('output-log');

        fileInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            // Setup Preview
            const reader = new FileReader();
            reader.onload = function(event) {
                imagePreview.src = event.target.result;
                previewContainer.classList.remove('hidden');
                document.getElementById('drop-zone').classList.add('hidden');
                
                // Start OCR
                extractText(event.target.result);
            }
            reader.readAsDataURL(file);
        });

        async function extractText(imageSrc) {
            // Reset UI
            outputLog.value = "";
            progressContainer.classList.remove('hidden');
            scanner.style.display = "block";
            imagePreview.classList.add('opacity-50');

            try {
                const result = await Tesseract.recognize(
                    imageSrc,
                    'eng', // English language model
                    {
                        logger: m => {
                            // Update live progress bar
                            if (m.status === "recognizing text") {
                                const pct = Math.floor(m.progress * 100);
                                progressBar.style.width = pct + "%";
                                progressPct.innerText = pct + "%";
                                statusText.innerText = "Extracting Data Matrices...";
                            } else {
                                statusText.innerText = m.status.toUpperCase();
                            }
                        }
                    }
                );

                // Processing Complete
                scanner.style.display = "none";
                imagePreview.classList.remove('opacity-50');
                statusText.innerText = "EXTRACTION COMPLETE";
                progressPct.innerText = "100%";
                
                // Display text
                outputLog.value = result.data.text;
                
            } catch (err) {
                console.error(err);
                statusText.innerText = "ENGINE FAILURE";
                statusText.classList.add("text-red-500");
                outputLog.value = "ERROR: Failed to extract text from image.";
            }
        }

        function copyData() {
            outputLog.select();
            document.execCommand('copy');
            alert("Raw data copied to clipboard.");
        }
    </script>
</body>
</html>
