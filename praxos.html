<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Praxos V5</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>
body { background:#0a0a0b; color:#e4e4e7; font-family: monospace; }
.glass { background:rgba(23,23,27,0.8); border:1px solid rgba(255,255,255,0.1); }
</style>
</head>

<body class="p-6">

<div class="max-w-4xl mx-auto space-y-6">

<h1 class="text-2xl font-bold">PRAXOS V5 — MULTI OUTCOME ENGINE</h1>

<div class="glass p-6 rounded space-y-4">
<input type="file" id="fileInput" accept="image/*"
class="w-full p-2 bg-black border border-gray-700 rounded">

<button onclick="scanImage()"
class="w-full bg-emerald-600 p-3 rounded font-bold">
Run Scan
</button>
</div>

<div id="output" class="glass p-6 rounded text-center">
Awaiting Scan...
</div>

</div>

<script>

async function scanImage() {
    const file = document.getElementById("fileInput").files[0];
    if (!file) return alert("Upload image");

    document.getElementById("output").innerHTML = "Reading...";

    const result = await Tesseract.recognize(file, 'eng');
    const text = result.data.text.toLowerCase();

    runEngine(text);
}

function runEngine(text) {

    let score = 50;
    let notes = [];

    // SIGNALS
    let wins = (text.match(/0-1|0-2|1-2/g) || []).length;
    let draws = (text.match(/1-1|0-0/g) || []).length;
    let highGoals = (text.match(/3-|4-|5-|6-|7-/g) || []).length;

    // 🧬 BOOGEYMAN
    let boogey = false;
    if (wins >= 2) {
        score += 15;
        boogey = true;
        notes.push("Boogeyman");
    }

    // ⚙️ DRAW ENGINE
    let drawEngine = false;
    if (draws >= 3) {
        score += 10;
        drawEngine = true;
        notes.push("Draw Engine");
    }

    // 🔴 CHAOS
    let chaos = false;
    if (highGoals >= 3) {
        score += 12;
        chaos = true;
        notes.push("High Goal Chaos");
    }

    // ⚔️ CONFLICT
    let conflict = (drawEngine && chaos);
    if (conflict) {
        score -= 15;
        notes.push("Conflict");
    }

    // MODE DETECTION
    let mode = "CONTROL";

    if (drawEngine && !boogey) mode = "DRAW ENGINE";
    if (boogey && chaos) mode = "CHAOS DOMINANCE";
    if (boogey && !chaos) mode = "CONTROL";

    // CONFIDENCE
    score = Math.max(60, Math.min(92, score));

    // STRICT FILTER
    let verdict = score >= 75 && !conflict ? "BET" : "NO BET";

    // OUTCOMES
    let outcomes = [];

    if (mode === "DRAW ENGINE") {
        outcomes.push({name:"Draw", conf: score});
        outcomes.push({name:"Under 2.5", conf: score-5});
    }

    if (mode === "CONTROL") {
        outcomes.push({name:"X2", conf: score});
        outcomes.push({name:"Under 3.5", conf: score-6});
        outcomes.push({name:"Draw", conf: score-10});
    }

    if (mode === "CHAOS DOMINANCE") {
        outcomes.push({name:"Home Win", conf: score});
        outcomes.push({name:"Over 2.5", conf: score-5});
        outcomes.push({name:"BTTS", conf: score-8});
    }

    // DISPLAY
    document.getElementById("output").innerHTML = `
        <h2 class="text-xl font-bold mb-2">SCAN RESULT</h2>

        <div class="text-4xl text-emerald-400 font-black">${score}%</div>
        <p>${verdict}</p>
        <p class="text-sm text-gray-400">Mode: ${mode}</p>

        <div class="mt-4 text-left">
            <p class="font-bold mb-2">Signals:</p>
            ${notes.map(n => `<div>• ${n}</div>`).join("")}
        </div>

        <div class="mt-4 bg-black p-4 rounded text-left">
            <p class="font-bold mb-2">Outcomes:</p>
            ${outcomes.map(o => `<div>• ${o.name} (${o.conf}%)</div>`).join("")}
        </div>

        <div class="mt-4 font-bold text-emerald-400">
            ${verdict === "BET" ? "STAKE APPROVED" : "NO STAKE"}
        </div>
    `;
}

</script>

</body>
</html>
