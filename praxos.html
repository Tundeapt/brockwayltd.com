<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PRAXOS V8 ELITE</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>

<style>
body{background:#0b0f1a;color:white;font-family:Arial;padding:20px}
.card{background:#111827;padding:15px;margin-bottom:15px;border-radius:10px}
button{padding:10px;background:#00c853;border:none;color:white;cursor:pointer}
</style>
</head>

<body>

<h2>PRAXOS V8 ELITE</h2>

<div class="card">
<input type="file" id="files" multiple accept="image/*">
<button onclick="run()">SCAN</button>
</div>

<div class="card">
<pre id="out"></pre>
</div>

<div class="card">
<h3>History</h3>
<div id="history"></div>
</div>

<script>

/* =====================
   OCR + ENTRY
===================== */

async function run(){
 const files = document.getElementById("files").files;

 if(files.length !== 3){
   alert("Upload exactly 3 images");
   return;
 }

 let texts = [];

 for(let f of files){
   let text = await read(f);
   texts.push(cleanOCR(text));
 }

 const structured = buildStructure(texts);
 const result = analyze(structured);

 show(result);
 save(result);
}

/* =====================
   OCR
===================== */

async function read(file){
 const r = await Tesseract.recognize(file,'eng');
 return r.data.text;
}

/* =====================
   CLEAN OCR (fix O/0 etc)
===================== */

function cleanOCR(text){
 return text
   .replace(/O/g,"0")
   .replace(/l/g,"1")
   .replace(/[^\x00-\x7F]/g,"");
}

/* =====================
   PARSE MATCHES
===================== */

function extractMatches(text){
 let matches = [];
 let regex = /(\d+)\s*[-:]\s*(\d+)/g;
 let m;

 while((m = regex.exec(text)) !== null){
   matches.push({home:+m[1], away:+m[2]});
 }

 return matches.slice(0,15);
}

/* =====================
   STATS
===================== */

function stats(arr){
 let total = arr.length || 1;
 let draws = arr.filter(x=>x.home===x.away).length;
 let goals = arr.reduce((s,x)=>s+x.home+x.away,0);
 let btts = arr.filter(x=>x.home>0 && x.away>0).length;

 return {
   avgGoals: goals/total,
   drawRate: draws/total,
   bttsRate: btts/total
 };
}

/* =====================
   STRUCTURE ENGINE
===================== */

function buildStructure(texts){

 let datasets = texts.map(t=>extractMatches(t));

 // detect H2H (most draws)
 let drawRates = datasets.map(d=>stats(d).drawRate);
 let h2hIndex = drawRates.indexOf(Math.max(...drawRates));

 let h2h = datasets[h2hIndex];
 datasets.splice(h2hIndex,1);

 let [a,b] = datasets;

 let aStats = stats(a);
 let bStats = stats(b);

 // home = higher scoring bias
 let home = aStats.avgGoals > bStats.avgGoals ? a : b;
 let away = home === a ? b : a;

 return {h2h, home, away};
}

/* =====================
   PRAXOS CORE
===================== */

function analyze({h2h, home, away}){

 let H = stats(h2h);
 let Ho = stats(home);
 let Aw = stats(away);

 // weighted signals
 let drawSignal = (H.drawRate*0.3 + Ho.drawRate*0.35 + Aw.drawRate*0.35);
 let goalSignal = (H.avgGoals*0.3 + Ho.avgGoals*0.35 + Aw.avgGoals*0.35);
 let bttsSignal = (H.bttsRate*0.3 + Ho.bttsRate*0.35 + Aw.bttsRate*0.35);

 /* MODE */
 let mode = "CONTROL";

 if(drawSignal > 0.38) mode = "CHAOS";
 if(goalSignal > 3) mode = "ATTACK";

 /* PRIMARY */
 let primary;

 if(mode==="CHAOS"){
   primary = [
     {label:"X", conf:Math.round(drawSignal*100)},
     {label:"X2", conf:Math.round(drawSignal*95)}
   ];
 } else {
   primary = [
     {label:"X2", conf:64},
     {label:"2", conf:59}
   ];
 }

 /* SECONDARY */
 let secondary = [];

 if(goalSignal < 2.5){
   secondary.push({label:"Under 3.5", conf:60});
 } else {
   secondary.push({label:"Over 2.5", conf:58});
 }

 if(bttsSignal > 0.5){
   secondary.push({label:"BTTS", conf:57});
 } else {
   secondary.push({label:"BTTS NO", conf:55});
 }

 /* SCORES */
 let scores;

 if(mode==="CHAOS"){
   scores = ["1-1","2-2","1-2","2-1"];
 } else if(primary[0].label.includes("2")){
   scores = ["0-1","0-2","1-2","1-1"];
 } else {
   scores = ["2-0","2-1","1-0","1-1"];
 }

 let conf = primary[0].conf;

 /* STAKE LOGIC */
 let stake = "NO STAKE";
 if(conf >= 70) stake = "MEDIUM STAKE";
 else if(conf >= 60) stake = "SMALL STAKE";

 return {mode, primary, secondary, scores, conf, stake};
}

/* =====================
   OUTPUT
===================== */

function show(r){
 document.getElementById("out").innerText = `
Confidence: ${r.conf}%
Mode: ${r.mode}

PRIMARY:
• ${r.primary[0].label} (${r.primary[0].conf}%)
• ${r.primary[1].label} (${r.primary[1].conf}%)

SECONDARY:
• ${r.secondary[0].label} (${r.secondary[0].conf}%)
• ${r.secondary[1].label} (${r.secondary[1].conf}%)

SCORES:
• ${r.scores.join("\n• ")}

STAKE: ${r.stake}
`;
}

/* =====================
   HISTORY SYSTEM
===================== */

function save(r){
 let h = JSON.parse(localStorage.getItem("praxos")||"[]");

 h.unshift({
   time:new Date().toLocaleString(),
   pick:r.primary[0].label,
   result:"",
   conf:r.conf
 });

 localStorage.setItem("praxos",JSON.stringify(h.slice(0,30)));
 loadHistory();
}

function loadHistory(){
 let h = JSON.parse(localStorage.getItem("praxos")||"[]");

 document.getElementById("history").innerHTML = h.map((x,i)=>`
 <div>
 ${x.time} — ${x.pick} (${x.conf}%)
 <input placeholder="final score" onchange="setResult(${i},this.value)">
 </div>
 `).join("");
}

function setResult(i,v){
 let h = JSON.parse(localStorage.getItem("praxos")||"[]");
 h[i].result = v;
 localStorage.setItem("praxos",JSON.stringify(h));
}

loadHistory();

</script>

</body>
</html>
